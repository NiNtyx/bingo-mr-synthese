const INITIAL_BTS_REFS = [

const getWordPool = lists => {

const GAME_NAME = "Bingo Mr Synthèse";
const EXCLUDED_PLAYERS = ["teste", "teste2"]; // noms en minuscules
const LAB_USERS = ["enzo", "matys"]; // joueurs ayant acces au laboratoire
const DIFFICULTY_CONFIGS = {
  easy: {label:"Facile", size:3},
  medium: {label:"Moyen", size:4},

const COL_PHRASES = [

  "Verticalement, tu fais le ménage.",
  "Ils te regardent monter sans pouvoir suivre.",
  "Belle colonne, bien sale pour les autres."
];
const getDifficultyConfig = difficulty => DIFFICULTY_CONFIGS[difficulty] || DIFFICULTY_CONFIGS.normal;
const getDifficultyWinKey = difficulty => DIFFICULTY_WIN_KEYS[difficulty] || DIFFICULTY_WIN_KEYS.normal;
const getBoardSize = sessionData => getDifficultyConfig(sessionData&&sessionData.difficulty).size;
const getFreeIndex = size => size===5 ? Math.floor((size*size)/2) : null;
const getTotalCells = size => size*size;
const getCompletionTarget = size => getTotalCells(size);

const buildLines = size => {
  const lines = [];
  for (let row = 0; row < size; row++) {
    lines.push({cells:Array.from({length:size},(_,col)=>row*size+col), type:"ligne"});
  }
  for (let col = 0; col < size; col++) {
    lines.push({cells:Array.from({length:size},(_,row)=>row*size+col), type:"colonne"});
  }
  lines.push({cells:Array.from({length:size},(_,i)=>i*(size+1)), type:"diagonale"});
  lines.push({cells:Array.from({length:size},(_,i)=>(i+1)*(size-1)), type:"diagonale"});
  return lines;
};

const getLines = (ms, size) => buildLines(size).filter(l => l.cells.every(i => ms.has(i)));

const shuffle = a => {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
};

const genCard = (refs, size) => {
  const total = getTotalCells(size);
  const freeIndex = getFreeIndex(size);
  const neededRefs = freeIndex===null ? total : total-1;
  const pool = refs.length >= neededRefs ? refs : [...refs,...DEFAULT_REFS].filter((v,i,a)=>a.indexOf(v)===i);
  const p = shuffle(pool).slice(0, neededRefs);
  if (freeIndex===null) return p;
  const card = [];
  let wordIndex = 0;
  for (let i = 0; i < total; i++) {
    if (i===freeIndex) card.push("FREE");
    else card.push(p[wordIndex++]);
  }
  return card;
};

// Génère une grille en respectant les quotas de niveaux de mots selon la difficulté
const genCardWithLevels = (refs, size, wordLevels) => {
  const total = getTotalCells(size);
  const freeIndex = getFreeIndex(size);
  const neededRefs = freeIndex===null ? total : total-1;

  const getLevel = word => wordLevels[encodeURIComponent(word).replace(/\./g,'%2E')] || null;

  const hasAnyLevel = refs.some(w => getLevel(w) !== null);
  if (!hasAnyLevel) return genCard(refs, size);

  const byLevel = {hard:[], difficile:[], moyen:[], facile:[], none:[]};
  refs.forEach(w => { const lv = getLevel(w); byLevel[lv||"none"].push(w); });

  // Quotas selon la taille de grille
  // 3x3 (8 cases) : 0 hard possible, max 1 difficile rarement (20% de chance)
  // 4x4 (16 cases) : max 1 hard, max 1 difficile
  // 5x5 (24 cases) : max 1 hard, max 2 difficile
  let maxHard, maxDifficile;
  if (size === 3) {
    maxHard = 0; // Jamais de hard en 3x3
    maxDifficile = Math.random() < 0.2 ? 1 : 0; // 20% de chance d'avoir 1 difficile
  } else if (size === 4) {
    maxHard = Math.random() < 0.3 ? 1 : 0; // 30% de chance d'avoir 1 hard
    maxDifficile = 1;
  } else {
    maxHard = 1;
    maxDifficile = 2;
  }

  const pickedHard = shuffle(byLevel.hard).slice(0, maxHard);
  const pickedDifficile = shuffle(byLevel.difficile).slice(0, maxDifficile);
  const pickedEasy = shuffle([...byLevel.facile, ...byLevel.moyen, ...byLevel.none]);

  const remaining = neededRefs - pickedHard.length - pickedDifficile.length;
  const pickedEasySlice = pickedEasy.slice(0, remaining);

  let pool = [...pickedHard, ...pickedDifficile, ...pickedEasySlice];
  if (pool.length < neededRefs) {
    const extra = shuffle([...byLevel.hard, ...byLevel.difficile]).filter(w=>!pool.includes(w));
    pool = [...pool, ...extra].slice(0, neededRefs);
  }
  if (pool.length < neededRefs) {
    pool = [...pool, ...shuffle(refs).filter(w=>!pool.includes(w))].slice(0, neededRefs);
  }

  pool = shuffle(pool);

  if (freeIndex===null) return pool;
  const card = [];
  let wordIndex = 0;
  for (let i = 0; i < total; i++) {
    if (i===freeIndex) card.push("FREE");
    else card.push(pool[wordIndex++]);
  }
  return card;
};

  const size = getBoardSize(sessionData);
  const freeIndex = getFreeIndex(size);
  return getMarkedIndicesForPlayer(sessionData, name).filter(i=>i!==freeIndex);
}

function shuffleBoardState(card, markedObj, size) {
  const total = getTotalCells(size);
  const freeIndex = getFreeIndex(size);
  const movableIndices = Array.from({length:total},(_,i)=>i).filter(i=>i!==freeIndex);
  const items = movableIndices.map(index=>({
    cell:card[index],
    marked:!!(markedObj&&markedObj[index])
  }));
  const shuffledItems = shuffle(items);
  const nextCard = [...card];
  const nextMarked = {};
  movableIndices.forEach((slotIndex, idx)=>{
    const item = shuffledItems[idx];
    nextCard[slotIndex] = item.cell;
    if (item.marked) nextMarked[slotIndex] = true;
  });
  if (freeIndex!==null) nextCard[freeIndex] = "FREE";
  return {card:nextCard, marked:nextMarked};
}

function buildFreezeTargets(sessionData, sourcePlayer) {
  const size = getBoardSize(sessionData);
  const total = getTotalCells(size);
  const freeIndex = getFreeIndex(size);
  const players = Object.keys((sessionData&&sessionData.players)||{}).filter(name=>name!==sourcePlayer);
  const targets = {};
  players.forEach(name=>{
    const markedObj = (sessionData&&sessionData.marked&&sessionData.marked[name]) || {};
    const markedSet = new Set(Object.keys(markedObj).map(Number));
    if (freeIndex!==null) markedSet.add(freeIndex);
    const choices = Array.from({length:total},(_,i)=>i).filter(i=>!markedSet.has(i));
    if (choices.length>0) targets[name] = randFrom(choices);
  });
  return targets;
}

function getAvailablePowerTypes(sessionData, sourcePlayer) {
  const allOthers = getOtherPlayerNames(sessionData, sourcePlayer);
  const targetLock = ((sessionData||{}).powerState||{}).targetLock;
  const others = (targetLock && targetLock.target && targetLock.target!==sourcePlayer && allOthers.includes(targetLock.target))
    ? [targetLock.target]
    : allOthers;
  const freezeTargets = buildFreezeTargets(sessionData, sourcePlayer);
  const usableFreezeTargets = others.filter(name=>freezeTargets[name]!==undefined);
  const bombTargets = others.filter(name=>getSelectableMarkedIndices(sessionData, name).length>0);
  // Ghost et Trap : cases non cochées disponibles (même condition que freeze)
  const ghostTrapTargets = others.filter(name=>freezeTargets[name]!==undefined);
  const options = [];
  if (usableFreezeTargets.length>0) options.push("freeze");
  if (others.length>0) options.push("shuffle");
  options.push("shield");
  if (allOthers.length>0) options.push("target");
  if (bombTargets.length>0) options.push("bomb","sabotage");
  if (ghostTrapTargets.length>0) options.push("ghost","trap");
  return options.length>0 ? options : ["shield"];
}

function buildSessionSummary(sessionCode, sessionData, winnerName, statBoosts) {
  const rawStats = (sessionData&&sessionData.stats) || {};
  const mergedStats = {};
  Object.keys(rawStats).forEach(name=>{
    mergedStats[name] = {
      lineCount: ((rawStats[name]&&rawStats[name].lineCount) || 0)
    };
  });
  Object.entries(statBoosts||{}).forEach(([name, boost])=>{
    const extra = (boost&&boost.lineCount) || 0;
    mergedStats[name] = {
      ...(mergedStats[name]||{lineCount:0}),
      lineCount: ((mergedStats[name]&&mergedStats[name].lineCount) || 0) + extra
    };
  });
  const players = Object.keys((sessionData&&sessionData.players) || {});
  const topLinePlayer = players.reduce((best, name)=>{
    const count = (mergedStats[name]&&mergedStats[name].lineCount) || 0;
    if (!best) return {name, count};
    if (count > best.count) return {name, count};
    if (count===best.count && name.localeCompare(best.name,"fr") < 0) return {name, count};
    return best;
  }, null);
  return {
    code: sessionCode,
    winner: winnerName || null,
    topLinePlayer: topLinePlayer ? topLinePlayer.name : null,
    topLineCount: topLinePlayer ? topLinePlayer.count : 0,
    players,
    difficulty: (sessionData&&sessionData.difficulty) || "normal",
    powerMode: !!(sessionData&&sessionData.powerMode),
    endedAt: Date.now()
  };
}


// Calcule le gagnant quand la partie se termine sans bingo
// Règles : 1) plus de lignes/colonnes  2) plus de mots cochés  3) dernière action la plus récente
function resolveTimedWinner(sessionData) {
  const players = Object.keys((sessionData&&sessionData.players) || {});
  if (!players.length) return null;
  const stats = (sessionData&&sessionData.stats) || {};
  const marked = (sessionData&&sessionData.marked) || {};
  const scored = players.map(name => {
    const st = stats[name] || {};
    const markedObj = marked[name] || {};
    const markedCount = Object.keys(markedObj).length;
    return {
      name,
      lineCount:   st.lineCount    || 0,
      markedCount: markedCount,
      lastMarkedAt: st.lastMarkedAt || 0
    };
  });
  scored.sort((a, b) => {
    if (b.lineCount   !== a.lineCount)   return b.lineCount   - a.lineCount;
    if (b.markedCount !== a.markedCount) return b.markedCount - a.markedCount;
    return b.lastMarkedAt - a.lastMarkedAt; // le plus récent gagne
  });
  return scored[0].name;
}

async function compressImage(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        c.width = c.height = 130;
        const ctx = c.getContext("2d");
        const m = Math.min(img.width, img.height);
        ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,130,130);
        res(c.toDataURL("image/jpeg",0.78));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

        {/* Sous-texte */}
        <div style={{
          position:"absolute",bottom:"20%",left:"50%",transform:"translateX(-50%)",

          color:"rgba(150,255,150,0.75)",

        {/* Particules fantômes aux coins */}
        {[

  // --- TRAP : piège à ours qui claque ---
  if (type==="trap") {
    return (
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:1200,overflow:"hidden",animation:"powerFlash 2.0s ease forwards"}}>

function LoginScreen({onLogin}) {
  const [name, setName] = useState("");

  const go = () => {
    if (!name.trim()) { setShake(true); setTimeout(()=>setShake(false),500); return; }

  };
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"1rem"}}>
      <div style={{textAlign:"center",background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.13)",borderRadius:18,padding:"3rem 2.5rem",maxWidth:400,width:"100%"}}>
        <div style={{fontSize:"clamp(2rem,8vw,3.8rem)",fontFamily:"Georgia,serif",fontWeight:900,letterSpacing:"0.2em",color:"#f7c948",textShadow:"0 0 30px rgba(247,201,72,0.4)",lineHeight:1.1,marginBottom:"1rem"}}>{GAME_NAME}</div>
        <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
          <input placeholder="Ton prenom..." value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} autoFocus style={shake?{animation:"shake 0.4s"}:{}}/>
          <button className="btn" onClick={go} style={{width:"100%",fontSize:"1.05rem",padding:"0.85rem"}}>Connexion 🎲</button>
        </div>
        <p style={{marginTop:"1rem",fontSize:"0.78rem",color:"rgba(240,232,200,0.3)"}}>Profil créé automatiquement</p>
      </div>
    </div>
  );
}

function ProfileScreen({player, savePlayer, onContinue, onLab}) {
  const fileRef = useRef();
  const [uploading, setUploading] = useState(false);
  const fl = getFlame(player.streak||0);
  const handlePhoto = async e => {
    const f = e.target.files[0]; if (!f) return;
    setUploading(true);
    try { const c = await compressImage(f); savePlayer({...player,photo:c}); }
    finally { setUploading(false); }
  };
  const winRate = getWinRate(player);
  const isLabUser = LAB_USERS.includes((player.name||"").trim().toLowerCase());
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"1rem"}}>
      <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.13)",borderRadius:18,padding:"2.5rem 2rem",maxWidth:380,width:"100%",textAlign:"center"}}>
        <h2 style={{color:"#f7c948",marginBottom:"1.8rem",fontSize:"1.1rem",fontWeight:800,letterSpacing:"0.12em"}}>MON PROFIL</h2>
        <div style={{position:"relative",display:"inline-block",marginBottom:"1.3rem"}}>
          <FlameAvatar photo={player.photo} name={player.name} streak={player.streak||0} bestStreak={player.bestStreak||0} size={104}/>
          <button onClick={()=>fileRef.current.click()} disabled={uploading} title="Changer la photo"
            style={{position:"absolute",bottom:3,right:3,background:"#f7c948",border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.95rem",boxShadow:"0 2px 8px rgba(0,0,0,0.4)"}}>
            {uploading?"...":"✏️"}
          </button>
        </div>
        <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
        <div style={{fontSize:"1.65rem",fontWeight:800,marginBottom:"0.25rem"}}>{player.name}</div>
        {fl && <div style={{color:fl.color,fontSize:"0.9rem",marginBottom:"0.8rem",fontWeight:700}}>{fl.icon} {fl.label}</div>}
        <div style={{display:"flex",justifyContent:"center",margin:"1.5rem 0",background:"rgba(0,0,0,0.22)",borderRadius:12,overflow:"hidden"}}>
          {[
            {label:"Victoires",value:player.wins||0,color:"#f7c948"},
            {label:"Parties",  value:player.gamesPlayed||0,color:"#5cc8e0"},
            {label:"Serie",    value:player.streak||0,color:(fl&&fl.color)||"rgba(240,232,200,0.3)"},
            {label:"Taux",     value:winRate+"%",color:"#7de08a"},
          ].map((s,i)=>(
            <div key={i} style={{flex:1,padding:"1rem 0.5rem",borderRight:i<3?"1px solid rgba(255,255,255,0.07)":"none"}}>
              <div style={{fontSize:"1.65rem",fontWeight:900,color:s.color,lineHeight:1}}>{s.value}</div>
              <div style={{fontSize:"0.68rem",color:"rgba(240,232,200,0.4)",marginTop:4,textTransform:"uppercase"}}>{s.label}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:"0.7rem",marginBottom:"1.1rem"}}>
          {[
            {label:"Victoires Facile", value:player.winsEasy||0, color:"#8bd96b"},
            {label:"Victoires Moyen", value:player.winsMedium||0, color:"#5cc8e0"},
            {label:"Victoires Normal", value:player.winsNormal||0, color:"#f7c948"}
          ].map(stat=>(
            <div key={stat.label} style={{background:"rgba(0,0,0,0.18)",borderRadius:12,padding:"0.8rem 0.55rem"}}>
              <div style={{fontSize:"1.35rem",fontWeight:900,color:stat.color,lineHeight:1}}>{stat.value}</div>
              <div style={{fontSize:"0.66rem",color:"rgba(240,232,200,0.44)",marginTop:6,textTransform:"uppercase",lineHeight:1.35}}>{stat.label}</div>
            </div>
          ))}

        {isLabUser && (
          <button className="btn-ghost" onClick={onLab} style={{width:"100%",fontSize:"0.95rem",padding:"0.85rem",marginBottom:"0.8rem"}}>

          </button>
        )}
        <button className="btn" onClick={onContinue} style={{width:"100%",fontSize:"1.05rem",padding:"0.9rem"}}>Jouer 🎲</button>
      </div>
    </div>
  );
}

function LabScreen({player, onBack, onStartLab, onPlayers}) {
  const [difficulty, setDifficulty] = useState("normal");

  const [activeTab, setActiveTab] = useState("lancer");
  const cfg = getDifficultyConfig(difficulty);

  // Etat des niveaux de mots (chargé depuis Firebase)
  const [wordLevels, setWordLevels] = useState({});
  const [wordList, setWordList] = useState([]);
  const [levelFilter, setLevelFilter] = useState(null); // null = tous
  useEffect(()=>{
    if (!db) return;
    const levRef = db.ref("wordLevels");
    const levHandler = snap=>setWordLevels(snap.val()||{});
    levRef.on("value", levHandler);
    const listRef = db.ref("wordLists/bts");
    const listHandler = snap=>{
      const raw = snap.val();
      setWordList(raw&&raw.length ? raw : INITIAL_BTS_REFS);
    };
    listRef.on("value", listHandler);
    return ()=>{ levRef.off("value",levHandler); listRef.off("value",listHandler); };
  },[]);

  const setWordLevel = (word, level) => {
    if (!db) return;
    if (level===null) db.ref("wordLevels/"+encodeURIComponent(word).replace(/\./g,'%2E')).remove();
    else db.ref("wordLevels/"+encodeURIComponent(word).replace(/\./g,'%2E')).set(level);
  };

  const sortedWords = [...wordList].sort((a,b)=>a.localeCompare(b,"fr"));
  const filteredWords = levelFilter
    ? sortedWords.filter(w=>wordLevels[encodeURIComponent(w).replace(/\./g,'%2E')]===levelFilter)

              background:levelFilter===null?"rgba(240,232,200,0.2)":"rgba(255,255,255,0.05)",
              color:"rgba(240,232,200,0.7)"
            }}>Tous ({sortedWords.length})</button>
            {WORD_LEVEL_OPTIONS.map(opt=>{
              const count = sortedWords.filter(w=>wordLevels[encodeURIComponent(w).replace(/\./g,'%2E')]===opt.key).length;
              return (
                <button key={opt.key} onClick={()=>setLevelFilter(levelFilter===opt.key?null:opt.key)} style={{
                  padding:"0.4rem 0.75rem",border:"none",borderRadius:7,cursor:"pointer",fontSize:"0.78rem",fontWeight:700,
                  background:levelFilter===opt.key?opt.color:"rgba(255,255,255,0.05)",
                  color:levelFilter===opt.key?"#1a2e1a":opt.color
                }}>{opt.label} ({count})</button>
              );
            })}
            <button onClick={()=>setLevelFilter("none")} style={{
              padding:"0.4rem 0.75rem",border:"none",borderRadius:7,cursor:"pointer",fontSize:"0.78rem",fontWeight:700,
              background:levelFilter==="none"?"rgba(240,232,200,0.15)":"rgba(255,255,255,0.05)",
              color:"rgba(240,232,200,0.45)"
            }}>Sans niveau ({sortedWords.filter(w=>!wordLevels[encodeURIComponent(w).replace(/\./g,'%2E')]).length})</button>
          </div>
          {/* Liste des mots */}
          <div style={{display:"flex",flexDirection:"column",gap:"0.45rem",maxHeight:"55vh",overflowY:"auto",paddingRight:"0.2rem"}}>
            {(levelFilter==="none"
              ? sortedWords.filter(w=>!wordLevels[encodeURIComponent(w).replace(/\./g,'%2E')])
              : filteredWords
            ).map(word=>{
              const key = encodeURIComponent(word).replace(/\./g,'%2E');
              const currentLevel = wordLevels[key] || null;
              const levelOpt = WORD_LEVEL_OPTIONS.find(o=>o.key===currentLevel);
              return (
                <div key={word} style={{display:"flex",alignItems:"center",gap:"0.5rem",background:"rgba(0,0,0,0.18)",borderRadius:10,padding:"0.55rem 0.75rem"}}>
                  <div style={{flex:1,fontSize:"0.88rem",fontWeight:600}}>{word}</div>
                  <div style={{display:"flex",gap:"0.3rem",flexShrink:0}}>
                    {WORD_LEVEL_OPTIONS.map(opt=>(
                      <button key={opt.key} onClick={()=>setWordLevel(word, currentLevel===opt.key?null:opt.key)} title={opt.label} style={{
                        width:28,height:28,border:"none",borderRadius:6,cursor:"pointer",fontSize:"0.7rem",fontWeight:900,
                        background:currentLevel===opt.key?opt.color:"rgba(255,255,255,0.06)",
                        color:currentLevel===opt.key?"#1a2e1a":opt.color,
                        transition:"background 0.15s"
                      }}>{opt.label[0]}</button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:"0.72rem",color:"rgba(240,232,200,0.28)",marginTop:"0.9rem",textAlign:"center"}}>
            Clique sur F/M/D/H pour attribuer un niveau. Reclique pour le retirer.
          </div>
        </div>
        )}
      </div>
    </div>
  );
}

function LabPlayersScreen({onBack, player}) {
  const [users, setUsers] = useState([]);
  const [resetTarget, setResetTarget] = useState(null);
  const [resetting, setResetting] = useState(false);
  const [editTarget, setEditTarget] = useState(null); // joueur en cours d'édition
  const [editValues, setEditValues] = useState({});
  const canEdit = player && player.name.toLowerCase() === "matys";
  useEffect(()=>{
    if (!db) return;
    const ref = db.ref("users");
    const handler = snap=>{
      const raw = snap.val() || {};
      const list = Object.values(raw).sort((a,b)=>{
        if ((b.wins||0)!==(a.wins||0)) return (b.wins||0)-(a.wins||0);
        if ((b.bestStreak||0)!==(a.bestStreak||0)) return (b.bestStreak||0)-(a.bestStreak||0);
        return (a.name||"").localeCompare(b.name||"","fr");
      });
      setUsers(list);
    };
    ref.on("value", handler);
    return ()=>ref.off("value", handler);
  },[]);

  const resetStats = (name) => {
    setResetting(true);
    db.ref("users/"+name).update({
      wins:0, gamesPlayed:0, streak:0, bestStreak:0,
      winsEasy:0, winsMedium:0, winsNormal:0
    }).finally(()=>{ setResetting(false); setResetTarget(null); });
  };

  const startEdit = (u) => {
    setEditTarget(u.name);
    setEditValues({
      wins: u.wins||0,
      gamesPlayed: u.gamesPlayed||0,
      streak: u.streak||0,
      bestStreak: u.bestStreak||0,
      winsEasy: u.winsEasy||0,
      winsMedium: u.winsMedium||0,
      winsNormal: u.winsNormal||0,
    });
  };

  const saveEdit = (name) => {
    const parsed = {};
    Object.entries(editValues).forEach(([k,v])=>{ parsed[k] = Math.max(0, parseInt(v)||0); });
    db.ref("users/"+name).update(parsed).then(()=>{ setEditTarget(null); });
  };

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"1rem"}}>
      <div style={{maxWidth:880,width:"100%"}}>
        <button className="back-btn" style={{marginBottom:"1.2rem",display:"block"}} onClick={onBack}>← Retour</button>

          <div style={{fontSize:"0.82rem",color:"rgba(240,232,200,0.48)",marginBottom:"1.1rem"}}>
            {users.length} profil{users.length!==1?"s":""} enregistré{users.length!==1?"s":""}

          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:"0.85rem"}}>
            {users.map(u=>{
              const rate = u.gamesPlayed ? Math.round((u.wins/u.gamesPlayed)*100) : 0;
              const isTarget = resetTarget===u.name;
              return (
                <div key={u.name} style={{background:"rgba(255,255,255,0.035)",border:isTarget?"1px solid rgba(255,80,80,0.5)":"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"1rem",transition:"border-color 0.2s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"0.85rem",marginBottom:"0.85rem"}}>

                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontWeight:800,fontSize:"1rem",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{u.name}</div>
                      <div style={{fontSize:"0.75rem",color:"rgba(240,232,200,0.4)"}}>🏆 {u.wins||0} victoire{(u.wins||0)!==1?"s":""}</div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:"0.55rem",marginBottom:"0.75rem"}}>

                        </button>
                        <button onClick={()=>setEditTarget(null)} style={{flex:1,padding:"0.5rem",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,color:"rgba(240,232,200,0.6)",fontSize:"0.78rem",cursor:"pointer"}}>

function HistoriqueTab({lastSessionSummary, userMap, lastLeaderName, onJoin}) {
  const [copied, setCopied] = useState(false);
  const [joining, setJoining] = useState(false);
  const copyCode = () => {
    if (!lastSessionSummary) return;
    navigator.clipboard&&navigator.clipboard.writeText(lastSessionSummary.code).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false), 2000);
    });
  };
  return (
    <div style={{background:"rgba(255,255,255,0.04)",border:"1.5px solid rgba(255,255,255,0.08)",borderRadius:16,padding:"1rem"}}>
      <div style={{fontSize:"1rem",fontWeight:900,color:"#f7c948",marginBottom:"0.35rem"}}>Dernière session jouée</div>
      <div style={{fontSize:"0.74rem",color:"rgba(240,232,200,0.42)",marginBottom:"0.95rem"}}>Rejoins la même session directement</div>

        <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
          {/* Code cliquable */}
          <div style={{background:"rgba(0,0,0,0.22)",borderRadius:12,padding:"1rem",textAlign:"center",cursor:"pointer"}} onClick={copyCode}>
            <div style={{fontSize:"0.68rem",color:"rgba(240,232,200,0.42)",textTransform:"uppercase",marginBottom:"0.5rem"}}>Code de session</div>
            <div style={{fontSize:"2rem",fontWeight:900,color:"#f7c948",letterSpacing:"0.35em",fontFamily:"Georgia,serif",textShadow:"0 0 15px rgba(247,201,72,0.4)"}}>{lastSessionSummary.code}</div>
            <div style={{fontSize:"0.72rem",color:copied?"#7de08a":"rgba(240,232,200,0.35)",marginTop:"0.4rem",transition:"color 0.2s"}}>{copied?"✓ Code copié !":"Appuie pour copier"}</div>

            {joining?"...":"→ Rejoindre cette session"}

            <div style={{display:"flex",alignItems:"center",gap:"0.8rem"}}>

                photo={lastLeaderName&&userMap[lastLeaderName]?userMap[lastLeaderName].photo:null}

                streak={lastLeaderName&&userMap[lastLeaderName]?userMap[lastLeaderName].streak:0}

              />
              <div style={{minWidth:0}}>
                <div style={{fontWeight:900,fontSize:"0.98rem",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {lastSessionSummary.winner?(lastSessionSummary.winner):(lastSessionSummary.topLinePlayer||"Aucun")}
                </div>
                <div style={{fontSize:"0.76rem",color:"rgba(240,232,200,0.52)"}}>
                  {lastSessionSummary.winner?"Gagnant de la session":"Meilleur total lignes/colonnes"}

function LobbyScreen({player, onProfile, onCreate, onJoin, onWords, allUsers, lastSessionSummary}) {
  const [code, setCode] = useState("");
  const [joining, setJoining] = useState(false);
  const [sortKey, setSortKey] = useState("wins");
  const tryJoin = () => {
    if (!code.trim()) return;
    setJoining(true);
    onJoin(code.trim()).finally(()=>setJoining(false));
  };
  const leaderboard = [...(allUsers||[])].filter(u=>!EXCLUDED_PLAYERS.includes((u.name||"").trim().toLowerCase())).sort((a,b)=>{
    const diff = getLeaderboardValue(b, sortKey) - getLeaderboardValue(a, sortKey);
    if (diff!==0) return diff;
    return (a.name||"").localeCompare(b.name||"","fr");
  });
  const userMap = leaderboard.reduce((acc, user)=>{
    acc[user.name] = user;
    return acc;
  }, {});
  // userMap complet pour l'historique (inclut tous les joueurs)
  const allUserMap = (allUsers||[]).reduce((acc, user)=>{ acc[user.name]=user; return acc; }, {});
  const lastLeaderName = (lastSessionSummary&&lastSessionSummary.winner) || (lastSessionSummary&&lastSessionSummary.topLinePlayer) || null;
  const [activeTab, setActiveTab] = useState("jouer");
  const [slideDir, setSlideDir] = useState("left");

    setSlideDir(to > from ? "left" : "right");
    setActiveTab(key);
  };
  const slideClass = slideDir === "left" ? "tab-slide-left" : "tab-slide-right";
  return (
    <div style={{minHeight:"100vh",padding:"1rem"}}>
      <div style={{maxWidth:540,margin:"0 auto"}}>

        {/* Barre d'onglets */}
        <div style={{display:"flex",gap:"0.4rem",marginBottom:"1.2rem",background:"rgba(0,0,0,0.25)",borderRadius:12,padding:"0.3rem"}}>

            <button key={tab.key} onClick={()=>handleTabChange(tab.key)} style={{
              flex:1,padding:"0.6rem 0.3rem",border:"none",borderRadius:9,cursor:"pointer",
              fontWeight:700,fontSize:"0.8rem",transition:"all 0.18s",
              background: activeTab===tab.key ? "#f7c948" : "transparent",
              color: activeTab===tab.key ? "#1a2e1a" : "rgba(240,232,200,0.55)"

          ))}

          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:"1rem"}}>{player.name}</div>
            <div style={{fontSize:"0.75rem",color:"rgba(240,232,200,0.38)",marginTop:2}}>🏆 {player.wins||0} victoire{(player.wins||0)!==1?"s":""} - Modifier</div>
          </div>
        </div>
        <div style={{textAlign:"center",marginBottom:"2.5rem"}}>
          <div style={{fontSize:"clamp(2rem,7vw,4rem)",fontFamily:"Georgia,serif",fontWeight:900,letterSpacing:"0.2em",color:"#f7c948",textShadow:"0 0 30px rgba(247,201,72,0.3)",lineHeight:1.1}}>{GAME_NAME}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>

function InviteButton({sessionCode, sessionData}) {
  const [lastSent, setLastSent] = useState(0);
  const [sent, setSent] = useState(false);
  const COOLDOWN = 60000; // 60 secondes anti-spam

  const sendInvite = () => {
    const now = Date.now();
    if (now - lastSent < COOLDOWN) return;
    setLastSent(now);
    setSent(true);
    db.ref("meta/invite").set({
      sessionCode,
      host: (sessionData&&sessionData.host) || "?",
      difficulty: (sessionData&&sessionData.difficulty) || "normal",
      powerMode: !!(sessionData&&sessionData.powerMode),
      sentAt: now
    });
    setTimeout(()=>setSent(false), 4000);
  };

  const remaining = Math.max(0, Math.ceil((COOLDOWN - (Date.now()-lastSent))/1000));
  const canSend = Date.now()-lastSent >= COOLDOWN;

  return (
    <button
      className="btn-ghost"
      onClick={sendInvite}
      disabled={!canSend}
      style={{width:"100%",marginTop:"0.6rem",padding:"0.75rem",fontSize:"0.9rem",opacity:canSend?1:0.5}}
    >
      {sent ? "📣 Invitations envoyées !" : canSend ? "📣 Inviter les joueurs en ligne" : "📣 Invitation envoyée ("+remaining+"s)"}
    </button>
  );
}

function GameScreen({player, card, marked, sessionData, sessionCode, currentNotif, onToggle, onLeave, showConfetti, clearNotif, isLabMode, onLabAction, freezeState, pendingPowerAction, onResolvePowerAction, powerAnim, clearPowerAnim, onEndGame}) {
  const size = getBoardSize(sessionData);
  const totalCells = getTotalCells(size);
  const winLines = getLines(marked, size).filter(l=>l.type!=="diagonale");
  const isWinCell = i => winLines.some(l=>l.cells.includes(i));
  const players = Object.keys((sessionData&&sessionData.players)||{});
  const progress = Math.round((marked.size/totalCells)*100);
  const isGameOver = !!(sessionData&&sessionData.winner);
  const powerMode = !!(sessionData&&sessionData.powerMode) && !isLabMode;
  const hasShield = !!((((sessionData||{}).powerState||{}).shields||{})[player.name]);
  const isHost = (sessionData&&sessionData.host)===player.name;
  const endsAt = (sessionData&&sessionData.endsAt) || null;
  const [confirmIndex, setConfirmIndex] = useState(null);
  const [showStopConfirm, setShowStopConfirm] = useState(false);
  const [countdown, setCountdown] = useState(null);

  // Countdown timer — le host termine la partie quand le chrono atteint 0
  const endGameCalledRef = React.useRef(false);
  useEffect(()=>{
    endGameCalledRef.current = false; // reset à chaque nouvelle partie
  },[endsAt]);
  useEffect(()=>{
    if (!endsAt || isGameOver) { setCountdown(null); return; }
    const tick = ()=>{
      const rem = endsAt - Date.now();
      setCountdown(rem > 0 ? rem : 0);
      if (rem <= 0 && isHost && !isLabMode && !endGameCalledRef.current) {
        endGameCalledRef.current = true;
        db.ref("sessions/"+sessionCode).once("value").then(snap=>{
          if (snap.exists() && snap.val().status==="playing") onEndGame();
        });
      }
    };
    tick();
    const interval = setInterval(tick, 1000);
    return ()=>clearInterval(interval);
  },[endsAt, isGameOver, isHost, isLabMode, sessionCode, onEndGame]);

  const formatCountdown = ms=>{
    if (ms===null||ms===undefined) return null;
    const totalSec = Math.max(0, Math.ceil(ms/1000));
    const h = Math.floor(totalSec/3600);
    const m = Math.floor((totalSec%3600)/60);
    const s = totalSec%60;
    if (h>0) return h+"h"+String(m).padStart(2,"0")+"m"+String(s).padStart(2,"0")+"s";
    return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  };
  const [selectedSabTarget, setSelectedSabTarget] = useState("");
  useEffect(()=>{
    setSelectedSabTarget("");
  },[pendingPowerAction&&pendingPowerAction.type, pendingPowerAction&&pendingPowerAction.owner]);

  // Validation automatique du trap quand tous les joueurs ont voté oui
  useEffect(()=>{
    if (isLabMode) return;
    const allTraps = (sessionData&&sessionData.trapCells&&sessionData.trapCells[player.name])||{};
    const pendingEntry = Object.entries(allTraps).find(([,t])=>t&&t.pending&&t.gageDone);
    if (!pendingEntry) return;
    const [trapIdx, trapInfo] = pendingEntry;
    const totalPlayers = players.length;
    if (totalPlayers < 2) return;
    const votes = trapInfo.voters || {};
    const yesVotes = Object.values(votes).filter(v=>v===true).length;
    const allVoted = Object.keys(votes).length >= totalPlayers - 1;
    if (allVoted && yesVotes === totalPlayers - 1) {
      // Tous ont validé → cocher la case et supprimer le trap
      db.ref("sessions/"+sessionCode+"/trapCells/"+player.name+"/"+trapIdx).remove();
      const idx = Number(trapIdx);
      if (!marked.has(idx)) onToggle(idx);
    }
  },[sessionData&&sessionData.trapCells, players.length]);
  useEffect(()=>{
    if (confirmIndex===null) return;
    if ((sessionData&&sessionData.winner) || !card[confirmIndex]) setConfirmIndex(null);
  },[confirmIndex,sessionData&&sessionData.winner,card]);
  const pendingTargets = (pendingPowerAction&&pendingPowerAction.targets) || [];
  // Sabotage : utilise pendingTargets si dispo, sinon tous les adversaires avec des cases cochées
  // Ne filtre PAS par getSelectableMarkedIndices pour éviter les désync — on filtre à l'affichage
  const sabotageTargets = (() => {
    const pool = (pendingPowerAction&&pendingPowerAction.type==="sabotage" && pendingTargets.length>0)
      ? pendingTargets
      : getOtherPlayerNames(sessionData, player.name);
    return pool.filter(name => {
      const markedObj = (sessionData&&sessionData.marked&&sessionData.marked[name]) || {};
      const freeIdx = getFreeIndex(getBoardSize(sessionData));
      return Object.keys(markedObj).some(k => Number(k) !== freeIdx);
    });
  })();
  const sabotageChoices = selectedSabTarget
    ? (() => {
        const markedObj = (sessionData&&sessionData.marked&&sessionData.marked[selectedSabTarget]) || {};
        const freeIdx = getFreeIndex(getBoardSize(sessionData));
        const card_target = (sessionData&&sessionData.cards&&sessionData.cards[selectedSabTarget]) || [];
        return Object.keys(markedObj)
          .map(Number)
          .filter(idx => idx !== freeIdx)
          .map(idx => ({index:idx, label:card_target[idx]||("Case "+(idx+1))}));
      })()
    : [];
  return (
    <div style={{maxWidth:680,margin:"0 auto",padding:"0.9rem 0.9rem 2rem"}}>
      {showConfetti&&<Confetti/>}
      {powerAnim&&<PowerAnimation key={powerAnim.id} type={powerAnim.type} onDone={clearPowerAnim}/>}
      {currentNotif&&<NotifToast notif={currentNotif} onDone={clearNotif}/>}

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:"0.7rem",marginBottom:"0.7rem",flexWrap:"wrap"}}>
        <button className="back-btn" onClick={onLeave}>← Quitter</button>
        <FlameAvatar photo={player.photo} name={player.name} streak={player.streak||0} bestStreak={player.bestStreak||0} size={31}/>
        <span style={{fontWeight:600,fontSize:"0.88rem",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{player.name}</span>
        {powerMode && (
          <span style={{fontSize:"0.72rem",fontWeight:800,color:"#5cc8e0",background:"rgba(92,200,224,0.08)",border:"1px solid rgba(92,200,224,0.28)",borderRadius:999,padding:"0.18rem 0.55rem"}}>
            ⚡ Mode Pouvoir
          </span>
        )}
        {hasShield && (
          <span style={{fontSize:"0.72rem",fontWeight:800,color:"#f7c948",background:"rgba(247,201,72,0.08)",border:"1px solid rgba(247,201,72,0.32)",borderRadius:999,padding:"0.18rem 0.55rem"}}>
            🛡️ Bouclier
          </span>
        )}
        <div style={{marginLeft:"auto",display:"flex",gap:"0.35rem",alignItems:"center"}}>
          {players.filter(p=>p!==player.name).slice(0,5).map(p=><MiniPlayerBadge key={p} name={p} isHost={p===(sessionData&&sessionData.host)}/>)}
          <span style={{fontSize:"0.7rem",color:"rgba(240,232,200,0.32)",marginLeft:2}}>{players.length} joueurs</span>
          {sessionCode && (
            <span style={{fontSize:"0.68rem",fontWeight:800,color:isLabMode?"rgba(247,201,72,0.8)":"rgba(247,201,72,0.55)",background:isLabMode?"rgba(247,201,72,0.12)":"rgba(247,201,72,0.07)",border:"1px solid rgba(247,201,72,0.3)",borderRadius:6,padding:"0.15rem 0.45rem",letterSpacing:"0.12em",fontFamily:"monospace"}}>
              {isLabMode ? "🔬 "+sessionCode : sessionCode}
            </span>
          )}
        </div>
      </div>

      {/* Countdown + bouton arrêt host */}
      {(countdown!==null || (isHost && !isGameOver && !isLabMode)) && (
        <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"0.5rem",flexWrap:"wrap"}}>
          {countdown!==null && (
            <div style={{
              display:"flex",alignItems:"center",gap:"0.4rem",
              background: countdown<300000 ? "rgba(224,92,92,0.15)" : "rgba(255,255,255,0.06)",
              border: "1px solid "+(countdown<300000 ? "rgba(224,92,92,0.4)" : "rgba(255,255,255,0.12)"),
              borderRadius:8, padding:"0.3rem 0.7rem"
            }}>
              <span style={{fontSize:"0.75rem",color:countdown<300000?"#e05c5c":"rgba(240,232,200,0.5)"}}>⏱</span>
              <span style={{fontWeight:900,fontSize:"0.9rem",color:countdown<300000?"#e05c5c":"#f7c948",fontFamily:"monospace"}}>
                {formatCountdown(countdown)}
              </span>
            </div>
          )}
          {isHost && !isGameOver && !isLabMode && (
            <button onClick={()=>setShowStopConfirm(true)} style={{
              background:"rgba(224,92,92,0.12)",border:"1px solid rgba(224,92,92,0.35)",
              borderRadius:8,color:"rgba(224,140,140,0.9)",padding:"0.3rem 0.7rem",
              cursor:"pointer",fontSize:"0.75rem",fontWeight:700
            }}>⏹ Arrêter</button>
          )}
        </div>
      )}
      <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,marginBottom:"0.6rem",overflow:"hidden"}}>
        <div style={{height:"100%",width:progress+"%",background:"linear-gradient(90deg,#5cc8e0,#f7c948)",borderRadius:2,transition:"width 0.35s ease"}}/>
      </div>

      {/* BINGO */}
      <div style={{display:"grid",gridTemplateColumns:"repeat("+size+",1fr)",gap:3,marginBottom:3}}>
        {getBoardLetters(size).map(l=>(
          <div key={l} style={{textAlign:"center",fontWeight:900,fontSize:"clamp(1.1rem,3.5vw,1.75rem)",color:"#f7c948",letterSpacing:"0.08em",fontFamily:"Georgia,serif",padding:"0.22rem 0",textShadow:"0 0 10px rgba(247,201,72,0.5)"}}>{l}</div>
        ))}
      </div>

      {/* Grille */}
      <div style={{display:"grid",gridTemplateColumns:"repeat("+size+",1fr)",gap:3,position:"relative"}}>
        {card.map((cell,i)=>{
          const isFree = cell==="FREE";
          const isM = marked.has(i);
          const isW = isWinCell(i);
          const isFrozen = !!(freezeState && freezeState.index===i);
          const ghostCells = (!isLabMode&&sessionData&&sessionData.ghostCells&&sessionData.ghostCells[player.name])||{};
          const isGhost = !isM && !!ghostCells[String(i)];
          const trapCells = (!isLabMode&&sessionData&&sessionData.trapCells&&sessionData.trapCells[player.name])||{};
          const isTrap = !isM && !!trapCells[String(i)] && !trapCells[String(i)].pending;
          return (
            <div key={i} onClick={()=>{
              if (isFree || isGameOver || isFrozen || isM) return;
              if (isTrap) { onToggle(i); return; } // case piégée → directement handleToggle
              setConfirmIndex(i);
            }} style={{
              aspectRatio:"1",
              background: isFrozen?"rgba(92,200,224,0.2)":isW?"rgba(247,201,72,0.24)":isM&&!isFree?"rgba(92,200,224,0.14)":isFree?"rgba(247,201,72,0.13)":isTrap?"rgba(180,80,20,0.18)":isGhost?"rgba(140,180,255,0.07)":"rgba(255,255,255,0.04)",
              border: isFrozen?"1.5px solid rgba(92,200,224,0.92)":isW?"1.5px solid #f7c948":isM&&!isFree?"1.5px solid rgba(92,200,224,0.5)":isFree?"1.5px solid rgba(247,201,72,0.45)":isTrap?"1.5px solid rgba(200,100,30,0.7)":isGhost?"1.5px solid rgba(140,180,255,0.22)":"1.5px solid rgba(255,255,255,0.09)",
              borderRadius:7, display:"flex", alignItems:"center", justifyContent:"center",
              padding:"3px", position:"relative",
              cursor: isFree||isGameOver||isFrozen||isM ? "default" : "pointer",
              overflow:"hidden", userSelect:"none",
              transform: isM&&!isFree ? "scale(0.965)" : "scale(1)",
              transition:"background 0.18s,border-color 0.18s,transform 0.12s",
              boxShadow: isFrozen ? "0 0 18px rgba(92,200,224,0.3)" : isTrap ? "0 0 12px rgba(200,80,20,0.4)" : isW ? "inset 0 0 10px rgba(247,201,72,0.16)" : "none",
              animation: isFrozen ? "freezePulse 1.35s ease-in-out infinite" : "none",
              filter: "none"
            }}>
              {isFree
                ? <span style={{fontSize:"clamp(0.4rem,1.15vw,0.62rem)",color:"#f7c948",fontWeight:900,textAlign:"center"}}>★ FREE ★</span>
                : <span style={{fontSize:"clamp(0.4rem,1.15vw,0.64rem)",textAlign:"center",lineHeight:1.2,color:isM?"rgba(240,232,200,0.55)":"#f0e8c8",display:"block",width:"100%"}}>{cell}</span>
              }
              {isTrap && (
                <div style={{position:"absolute",top:3,right:3,fontSize:"clamp(0.7rem,2vw,0.95rem)",lineHeight:1,pointerEvents:"none",filter:"drop-shadow(0 0 4px rgba(200,80,20,0.9))"}}>🪤</div>
              )}
              {isM&&!isFree&&(
                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%) rotate(-15deg)",fontSize:"clamp(1.2rem,3.8vw,2rem)",color:"rgba(92,200,224,0.52)",fontWeight:900,pointerEvents:"none",lineHeight:1,animation:"stamp 0.18s ease"}}>✓</div>
              )}
              {isFrozen && (
                <>
                  <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(92,200,224,0.08),rgba(92,200,224,0.18))",pointerEvents:"none"}}/>
                  <div style={{position:"absolute",top:6,right:6,fontSize:"0.95rem",lineHeight:1,pointerEvents:"none"}}>❄️</div>
                </>
              )}
            </div>
          );
        })}
      </div>
      <div style={{textAlign:"center",marginTop:"0.65rem",color:"rgba(240,232,200,0.25)",fontSize:"0.73rem"}}>
        {marked.size}/{totalCells} cases — Complète tout le carton pour le BINGO ! — <span style={{opacity:0.6}}>La validation est définitive hors pouvoirs</span>
      </div>
      {isLabMode && (
        <div style={{marginTop:"1rem",background:"rgba(255,255,255,0.04)",border:"2px solid rgba(247,201,72,0.25)",borderRadius:14,padding:"1rem"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"0.8rem",marginBottom:"0.45rem",flexWrap:"wrap"}}>
            <div style={{color:"#f7c948",fontWeight:800}}>Panneau de test</div>
            <div style={{fontSize:"0.74rem",color:"rgba(240,232,200,0.42)"}}>Mode solo laboratoire</div>
          </div>
          <div style={{fontSize:"0.82rem",color:"rgba(240,232,200,0.62)",lineHeight:1.55,marginBottom:"0.9rem"}}>
            Ces boutons utilisent la vraie logique de cochage des cases pour vérifier les notifications de ligne, colonne et la victoire.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:"0.6rem"}}>
            <button className="btn" onClick={()=>onLabAction("ligne")} style={{width:"100%",fontSize:"0.88rem",padding:"0.8rem"}}>Compléter une ligne</button>
            <button className="btn" onClick={()=>onLabAction("colonne")} style={{width:"100%",fontSize:"0.88rem",padding:"0.8rem"}}>Compléter une colonne</button>
            <button className="btn" onClick={()=>onLabAction("bingo")} style={{width:"100%",fontSize:"0.88rem",padding:"0.8rem"}}>Faire un bingo</button>
            <button className="btn-ghost" onClick={()=>onLabAction("reset")} style={{width:"100%",fontSize:"0.88rem",padding:"0.8rem"}}>Réinitialiser</button>
          </div>
        </div>
      )}
      {showStopConfirm && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1090,padding:"1rem"}}>
          <div style={{maxWidth:420,width:"100%",background:"rgba(10,25,10,0.97)",border:"2px solid rgba(224,92,92,0.5)",borderRadius:18,padding:"1.4rem"}}>
            <div style={{fontSize:"1.05rem",fontWeight:900,color:"#e05c5c",marginBottom:"0.55rem"}}>⏹ Arrêter la partie ?</div>
            <div style={{fontSize:"0.88rem",lineHeight:1.6,color:"rgba(240,232,200,0.78)",marginBottom:"1.1rem"}}>
              La partie se terminera aux points. Le gagnant sera déterminé par le nombre de lignes et colonnes, puis de mots cochés, puis par la dernière action.
            </div>
            <div style={{display:"flex",gap:"0.7rem"}}>
              <button className="btn" style={{flex:1,background:"#e05c5c",color:"#fff"}} onClick={()=>{ setShowStopConfirm(false); onEndGame(); }}>Confirmer</button>
              <button className="btn-ghost" style={{flex:1}} onClick={()=>setShowStopConfirm(false)}>Annuler</button>
            </div>
          </div>
        </div>
      )}
      {confirmIndex!==null && card[confirmIndex] && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1090,padding:"1rem"}}>
          <div style={{maxWidth:420,width:"100%",background:"rgba(10,25,10,0.97)",border:"2px solid rgba(247,201,72,0.4)",borderRadius:18,padding:"1.2rem"}}>
            <div style={{fontSize:"1.05rem",fontWeight:900,color:"#f7c948",marginBottom:"0.55rem"}}>Confirmation</div>
            <div style={{fontSize:"0.9rem",lineHeight:1.55,color:"rgba(240,232,200,0.82)",marginBottom:"1rem"}}>
              Valides-tu le mot <span style={{color:"#f7c948",fontWeight:800}}>"{card[confirmIndex]}"</span> ?
            </div>
            <div style={{display:"flex",gap:"0.7rem"}}>
              <button className="btn" style={{flex:1}} onClick={()=>{
                onToggle(confirmIndex);
                setConfirmIndex(null);
              }}>Oui</button>
              <button className="btn-ghost" style={{flex:1}} onClick={()=>setConfirmIndex(null)}>Annuler</button>
            </div>
          </div>
        </div>
      )}
      {pendingPowerAction && pendingPowerAction.owner===player.name && pendingPowerAction.type==="target" && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100,padding:"1rem"}}>
          <div style={{maxWidth:420,width:"100%",background:"rgba(10,25,10,0.97)",border:"2px solid rgba(247,201,72,0.35)",borderRadius:18,padding:"1.2rem"}}>
            <div style={{fontSize:"1.1rem",fontWeight:900,color:"#f7c948",marginBottom:"0.35rem"}}>🎯 Ciblage</div>
            <div style={{fontSize:"0.84rem",color:"rgba(240,232,200,0.62)",lineHeight:1.55,marginBottom:"1rem"}}>
              Choisis le joueur qui recevra seul le prochain pouvoir offensif.
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"0.65rem"}}>
              {pendingTargets.map(name=>(
                <button key={name} className="btn" onClick={()=>onResolvePowerAction({type:"target",target:name})} style={{width:"100%",padding:"0.85rem 1rem"}}>
                  {name}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
      {/* MODALE GAGE — victime doit réaliser son gage */}
      {(()=>{
        const allTraps = (!isLabMode&&sessionData&&sessionData.trapCells&&sessionData.trapCells[player.name])||{};
        const pendingEntry = Object.entries(allTraps).find(([,t])=>t&&t.pending);
        if (!pendingEntry) return null;
        const [trapIdx, trapInfo] = pendingEntry;
        const totalPlayers = players.length;
        const votes = trapInfo.voters || {};
        const yesVotes = Object.values(votes).filter(v=>v===true).length;
        const allVoted = Object.keys(votes).length >= totalPlayers - 1;
        const approved = allVoted && yesVotes === totalPlayers - 1 && totalPlayers > 1;
        if (approved) return null; // useEffect gère la validation
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1150,padding:"1rem"}}>
            <div style={{maxWidth:460,width:"100%",background:"rgba(10,25,10,0.98)",border:"2px solid rgba(200,100,30,0.7)",borderRadius:18,padding:"1.4rem"}}>
              <div style={{fontSize:"2rem",textAlign:"center",marginBottom:"0.5rem"}}>🪤</div>
              <div style={{fontSize:"1.1rem",fontWeight:900,color:"rgba(220,120,50,0.95)",textAlign:"center",marginBottom:"0.5rem"}}>Tu as déclenché un piège !</div>
              <div style={{fontSize:"0.82rem",color:"rgba(240,232,200,0.5)",textAlign:"center",marginBottom:"1.2rem"}}>
                Piège posé par <span style={{color:"#f7c948",fontWeight:700}}>{trapInfo.owner||"?"}</span>
              </div>
              <div style={{background:"rgba(200,100,20,0.15)",border:"1px solid rgba(200,100,30,0.4)",borderRadius:12,padding:"1.1rem",marginBottom:"1.2rem",textAlign:"center"}}>
                <div style={{fontSize:"0.72rem",color:"rgba(240,232,200,0.45)",textTransform:"uppercase",marginBottom:"0.5rem",letterSpacing:"0.1em"}}>Ton gage</div>
                <div style={{fontSize:"1rem",fontWeight:700,color:"#f7c948",lineHeight:1.5}}>{trapInfo.gage}</div>
              </div>
              {!trapInfo.gageDone ? (
                <>
                  <div style={{fontSize:"0.82rem",color:"rgba(240,232,200,0.55)",textAlign:"center",marginBottom:"1rem"}}>
                    Réalise le gage devant tout le monde, puis clique sur le bouton.
                  </div>
                  <button className="btn" style={{width:"100%",padding:"1rem",fontSize:"1rem"}} onClick={()=>{
                    db.ref("sessions/"+sessionCode+"/trapCells/"+player.name+"/"+trapIdx+"/gageDone").set(true);
                  }}>✅ Gage réalisé !</button>
                </>
              ) : (
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"1.5rem",marginBottom:"0.5rem"}}>⏳</div>
                  <div style={{fontSize:"0.9rem",color:"rgba(240,232,200,0.6)"}}>En attente du vote des autres joueurs...</div>
                  <div style={{fontSize:"0.78rem",color:"rgba(240,232,200,0.35)",marginTop:"0.5rem"}}>{yesVotes}/{Math.max(0,totalPlayers-1)} validations</div>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* MODALE VOTE GAGE — les autres joueurs votent */}
      {(()=>{
        if (isLabMode) return null;
        const allPlayerTraps = (sessionData&&sessionData.trapCells)||{};
        for (const [victimName, traps] of Object.entries(allPlayerTraps)) {
          if (victimName === player.name) continue;
          for (const [trapIdx, trapInfo] of Object.entries(traps||{})) {
            if (!trapInfo||!trapInfo.pending||!trapInfo.gageDone) continue;
            const myVote = (trapInfo.voters||{})[player.name];
            if (myVote !== undefined) continue;
            const yesVotes = Object.values(trapInfo.voters||{}).filter(v=>v===true).length;
            const totalVoters = players.length - 1;
            return (
              <div key={victimName+trapIdx} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1150,padding:"1rem"}}>
                <div style={{maxWidth:420,width:"100%",background:"rgba(10,25,10,0.98)",border:"2px solid rgba(247,201,72,0.5)",borderRadius:18,padding:"1.4rem",textAlign:"center"}}>
                  <div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>🗳️</div>
                  <div style={{fontSize:"1rem",fontWeight:900,color:"#f7c948",marginBottom:"0.35rem"}}>Vote de gage</div>
                  <div style={{fontSize:"0.88rem",color:"rgba(240,232,200,0.7)",marginBottom:"0.8rem"}}>
                    <span style={{color:"#f7c948",fontWeight:700}}>{victimName}</span> a-t-il réalisé son gage ?
                  </div>
                  <div style={{background:"rgba(200,100,20,0.15)",border:"1px solid rgba(200,100,30,0.4)",borderRadius:10,padding:"0.9rem",marginBottom:"1rem"}}>
                    <div style={{fontSize:"0.9rem",fontWeight:700,color:"rgba(220,150,60,0.9)"}}>{trapInfo.gage}</div>
                  </div>
                  <div style={{fontSize:"0.75rem",color:"rgba(240,232,200,0.4)",marginBottom:"1rem"}}>{yesVotes}/{totalVoters} validation{yesVotes!==1?"s":""}</div>
                  <div style={{display:"flex",gap:"0.8rem"}}>
                    <button className="btn" style={{flex:1,padding:"0.9rem",fontSize:"0.95rem"}} onClick={()=>{
                      db.ref("sessions/"+sessionCode+"/trapCells/"+victimName+"/"+trapIdx+"/voters/"+player.name).set(true);
                    }}>✅ Oui, validé !</button>
                    <button className="btn-ghost" style={{flex:1,padding:"0.9rem",fontSize:"0.95rem"}} onClick={()=>{
                      db.ref("sessions/"+sessionCode+"/trapCells/"+victimName+"/"+trapIdx+"/voters/"+player.name).set(false);
                    }}>❌ Non</button>
                  </div>
                </div>
              </div>
            );
          }
        }
        return null;
      })()}
      {pendingPowerAction && pendingPowerAction.owner===player.name && pendingPowerAction.type==="sabotage" && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100,padding:"1rem"}}>
          <div style={{maxWidth:520,width:"100%",background:"rgba(10,25,10,0.97)",border:"2px solid rgba(247,201,72,0.35)",borderRadius:18,padding:"1.2rem"}}>
            <div style={{fontSize:"1.1rem",fontWeight:900,color:"#f7c948",marginBottom:"0.35rem"}}>🧨 Sabotage</div>
            <div style={{fontSize:"0.84rem",color:"rgba(240,232,200,0.62)",lineHeight:1.55,marginBottom:"1rem"}}>
              Choisis un joueur puis une case déjà cochée à lui retirer.
            </div>
            {!selectedSabTarget ? (
              <div style={{display:"flex",flexDirection:"column",gap:"0.65rem"}}>
                {sabotageTargets.map(name=>(
                  <button key={name} className="btn" onClick={()=>setSelectedSabTarget(name)} style={{width:"100%",padding:"0.85rem 1rem"}}>
                    {name}
                  </button>
                ))}
              </div>
            ) : (
              <>
                <button className="back-btn" onClick={()=>setSelectedSabTarget("")} style={{marginBottom:"0.8rem"}}>← Changer de joueur</button>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"0.65rem"}}>
                  {sabotageChoices.map(choice=>(
                    <button key={choice.index} className="btn-ghost" onClick={()=>onResolvePowerAction({type:"sabotage",target:selectedSabTarget,index:choice.index})} style={{width:"100%",padding:"0.85rem 0.9rem"}}>
                      {choice.label}
                    </button>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ================================================================
//  ECRAN GAGNANT
// ================================================================
function WinnerScreen({sessionData, player, onRematch, onLeave, showConfetti, isHost}) {
  const winner = sessionData&&sessionData.winner;
  const isWinner = winner===player.name;
  const isTimed = !!(sessionData&&sessionData.endsAt); // partie à durée limitée
  const [winnerData, setWinnerData] = useState(null);
  useEffect(()=>{
    if (winner&&db) db.ref("users/"+winner).once("value").then(s=>setWinnerData(s.val()));
  },[winner]);
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"1rem",textAlign:"center"}}>
      {showConfetti&&<Confetti/>}
      <div style={{maxWidth:420,width:"100%"}}>
        {winner&&winnerData&&(
          <div style={{marginBottom:"1.5rem",animation:"winnerPop 0.55s cubic-bezier(0.34,1.56,0.64,1)"}}>
            <FlameAvatar photo={winnerData.photo} name={winner} streak={winnerData.streak||0} bestStreak={winnerData.bestStreak||0} size={110}/>
          </div>
        )}
        <div style={{fontSize:isWinner?"4.5rem":"3.5rem",marginBottom:"0.5rem",animation:"popIn 0.4s ease"}}>{isWinner?"🏆":"🎖️"}</div>
        <h1 style={{fontSize:"clamp(1.5rem,6vw,2.5rem)",fontWeight:900,color:isWinner?"#f7c948":"rgba(240,232,200,0.8)",marginBottom:"0.5rem",animation:"popIn 0.35s ease 0.08s both"}}>
          {isWinner
            ? (isTimed ? "Victoire aux points !" : "BINGO ! Tu as gagné !")
            : winner ? (winner+" a gagné !") : "Partie terminée !"}
        </h1>
        <p style={{color:"rgba(240,232,200,0.5)",marginBottom:"2rem",fontSize:"0.9rem",lineHeight:1.5}}>
          {isWinner
            ? (isTimed ? "Tu avais le plus de lignes et de mots !" : "Tu as complété tout ton carton en premier !")
            : (isTimed ? "Pas assez de lignes cette fois..." : "Complète tout le carton avant les autres la prochaine fois !")}
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:"0.8rem"}}>
          {isHost
            ? <button className="btn" style={{width:"100%",fontSize:"1.05rem",padding:"1rem"}} onClick={onRematch}>
                🔁 Nouvelle partie (mêmes joueurs)
              </button>
            : <div style={{color:"rgba(240,232,200,0.4)",fontSize:"0.88rem",fontStyle:"italic",padding:"0.5rem"}}>
                En attente que l'hôte lance la prochaine partie...
              </div>
          }
          <button className="btn-ghost" style={{width:"100%",fontSize:"0.95rem",padding:"0.85rem"}} onClick={onLeave}>
            Quitter la session
          </button>
        </div>
      </div>
    </div>
  );
}

// ================================================================
//  APP
// ================================================================
function App() {
  if (!IS_CONFIGURED) return <SetupScreen/>;

  const [screen, setScreen] = useState("loading");
  const [player, setPlayer] = useState(null);
  const [sessionCode, setSessionCode] = useState("");
  const [sessionData, setSessionData] = useState(null);
  const [card, setCard] = useState([]);
  const [marked, setMarked] = useState(getInitialMarkedSet(5));
  const [wordLists, setWordLists] = useState({bts:INITIAL_BTS_REFS});
  const [wordLevels, setWordLevels] = useState({});
  const [wordSuggestions, setWordSuggestions] = useState({});
  const [allUsers, setAllUsers] = useState([]);
  const [lastSessionSummary, setLastSessionSummary] = useState(null);
  const [invite, setInvite] = useState(null);
  const [inviteDismissed, setInviteDismissed] = useState(0); // timestamp du dernier dismiss
  const [notifQueue, setNotifQueue] = useState([]);
  const [currentNotif, setCurrentNotif] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [isLabMode, setIsLabMode] = useState(false);
  const [freezeState, setFreezeState] = useState(null);
  const [powerAnim, setPowerAnim] = useState(null); // {type, id}
  const clRef = useRef(new Set());
  const seenRef = useRef(new Set());
  const statsRef = useRef(false);
  const gameRef = useRef(false);
  const labTimersRef = useRef([]);
  const notifTimersRef = useRef([]);
  const freezeTimerRef = useRef(null);
  const durationTimerRef = useRef(null);
  const handleToggleRef = useRef(null);
  const clearLabTimers = useCallback(()=>{
    labTimersRef.current.forEach(clearTimeout);
    labTimersRef.current = [];
  },[]);
  const clearNotifTimers = useCallback(()=>{
    notifTimersRef.current.forEach(clearTimeout);
    notifTimersRef.current = [];
  },[]);
  const scheduleNotif = useCallback((notif, delayMs=0)=>{
    if (delayMs<=0) {
      setNotifQueue(q=>[...q, notif]);
      return;
    }
    const timer = setTimeout(()=>{
      setNotifQueue(q=>[...q, notif]);
      notifTimersRef.current = notifTimersRef.current.filter(t=>t!==timer);
    }, delayMs);
    notifTimersRef.current.push(timer);
  },[]);
  const clearFreezeEffect = useCallback(()=>{
    if (freezeTimerRef.current) clearTimeout(freezeTimerRef.current);
    freezeTimerRef.current = null;
    setFreezeState(null);
  },[]);

  const clearDurationTimer = useCallback(()=>{
    if (durationTimerRef.current) clearTimeout(durationTimerRef.current);
    durationTimerRef.current = null;
  },[]);

  // Fin de partie sans bingo (timer écoulé ou arrêt manuel par le host)
  const handleEndGame = useCallback((sd, code)=>{
    if (!gameRef.current) return;
    gameRef.current = false;
    clearDurationTimer();
    const winner = resolveTimedWinner(sd);
    if (!winner) return; // sécurité si partie vide
    db.ref("sessions/"+code).update({winner, status:"finished"});
    db.ref("sessions/"+code+"/events").push({
      player: winner,
      message: winner+" a remport\u00e9 la partie aux points ! 🏆",
      type:"bingo", timestamp:Date.now()
    });
    const ranked = isStandardRankedMode(sd);
    const allPlayers = Object.keys((sd&&sd.players)||{});
    // Mettre à jour les stats de TOUS les joueurs
    allPlayers.forEach(name=>{
      db.ref("users/"+name).once("value").then(snap=>{
        const wp = normalizePlayer(snap.val()||{name});
        if (name===winner) {
          const newStreak = ranked ? (wp.streak||0)+1 : (wp.streak||0);
          const difficultyWinKey = getDifficultyWinKey((sd&&sd.difficulty)||"normal");
          db.ref("users/"+name).update({
            wins:(wp.wins||0)+1,
            [difficultyWinKey]:(wp[difficultyWinKey]||0)+1,
            gamesPlayed:(wp.gamesPlayed||0)+1,
            streak: ranked ? newStreak : (wp.streak||0),
            bestStreak: ranked ? Math.max(newStreak, wp.bestStreak||0) : (wp.bestStreak||0)
          });
        } else {
          // Perdants : incrémenter gamesPlayed et réinitialiser la série
          db.ref("users/"+name).update({
            gamesPlayed:(wp.gamesPlayed||0)+1,
            streak: ranked ? 0 : (wp.streak||0)
          });
        }
      });
    });
    const summary = buildSessionSummary(code, sd, winner, {});
    db.ref("meta/lastSession").set(summary);
  },[clearDurationTimer]);
  const applyFreezeEffect = useCallback(ev=>{
    if (!player || !ev || !ev.targets) return;
    const frozenIndex = ev.targets[player.name];
    if (frozenIndex===undefined || frozenIndex===null) return;
    // Freeze permanent jusqu'au prochain pouvoir (pas de timer)
    clearFreezeEffect();
    setFreezeState({index:frozenIndex, source:ev.player});
  },[player, clearFreezeEffect]);
  const updatePowerState = useCallback(updater=>{
    if (!sessionCode || !db) return Promise.resolve();
    return db.ref("sessions/"+sessionCode+"/powerState").transaction(current=>{
      const base = current || {shields:{},targetLock:null,pendingAction:null};
      return updater(base) || base;
    });
  },[sessionCode]);
  // File d'attente des notifications
  useEffect(()=>{
    if (!currentNotif && notifQueue.length>0) {
      setCurrentNotif(notifQueue[0]);
      setNotifQueue(q=>q.slice(1));
    }
  },[notifQueue,currentNotif]);

  useEffect(()=>{
    if (!db) return;
    const listRef = db.ref("wordLists");
    const levelsRef = db.ref("wordLevels");
    const suggestionRef = db.ref("wordSuggestions");
    const usersRef = db.ref("users");
    const lastSessionRef = db.ref("meta/lastSession");
    listRef.once("value").then(snap=>{
      if (!snap.exists()) {
        listRef.set({bts:INITIAL_BTS_REFS});
      }
    });
    const listHandler = snap=>{
      const raw = snap.val() || {};
      setWordLists({
        bts: raw.bts&&raw.bts.length ? raw.bts : INITIAL_BTS_REFS
      });
    };
    const levelsHandler = snap=>{ setWordLevels(snap.val()||{}); };
    const suggestionHandler = snap=>{ setWordSuggestions(snap.val() || {}); };
    const usersHandler = snap=>{
      const raw = snap.val() || {};
      setAllUsers(Object.values(raw).map(normalizePlayer));
    };
    const lastSessionHandler = snap=>{ setLastSessionSummary(snap.val() || null); };
    const inviteRef = db.ref("meta/invite");
    const inviteHandler = snap=>{
      const val = snap.val();
      if (!val) { setInvite(null); return; }
      // Ignorer les invites de plus de 30 secondes
      if (Date.now() - (val.sentAt||0) > 30000) { setInvite(null); return; }
      setInvite(val);
    };
    listRef.on("value", listHandler);
    levelsRef.on("value", levelsHandler);
    suggestionRef.on("value", suggestionHandler);
    usersRef.on("value", usersHandler);
    lastSessionRef.on("value", lastSessionHandler);
    inviteRef.on("value", inviteHandler);
    return ()=>{
      listRef.off("value", listHandler);
      levelsRef.off("value", levelsHandler);
      suggestionRef.off("value", suggestionHandler);
      usersRef.off("value", usersHandler);
      lastSessionRef.off("value", lastSessionHandler);
      inviteRef.off("value", inviteHandler);
    };
  },[]);

  // Chargement initial
  useEffect(()=>{
    const sp = localStorage.getItem("bp-player");
    if (!sp) { setScreen("login"); return; }
    const lp = JSON.parse(sp);
    db.ref("users/"+lp.name).once("value").then(snap=>{
      const fp = normalizePlayer(snap.exists() ? snap.val() : lp);
      setPlayer(fp); localStorage.setItem("bp-player",JSON.stringify(fp));
      const sc = localStorage.getItem("bp-session");
      if (!sc) { setScreen("lobby"); return; }
      db.ref("sessions/"+sc).once("value").then(ss=>{
        if (!ss.exists()||!(ss.val().players&&ss.val().players[fp.name])) {
          localStorage.removeItem("bp-session"); setScreen("lobby"); return;
        }
        const s = ss.val(); setSessionData(s); setSessionCode(sc);
        // Détecter si c'est une session labo
        const isLab = sc==="LABO" || !!(s.isLabSession);
        if (isLab) setIsLabMode(true);
        if (s.status==="playing"&&s.cards&&s.cards[fp.name]) {
          setCard(s.cards[fp.name]);
          const mo = (s.marked&&s.marked[fp.name])||{};
          const ms = getInitialMarkedSet(getBoardSize(s));
          Object.keys(mo).map(Number).forEach(i=>ms.add(i));
          setMarked(ms); getLines(ms, getBoardSize(s)).forEach(l=>clRef.current.add(l.cells.join("-")));
          gameRef.current=true; statsRef.current=false; setScreen("game");
          // Relancer le timer si host avec durée restante
          if (s.endsAt && s.host===fp.name) {
            const remaining = s.endsAt - Date.now();
            if (remaining > 0) {
              durationTimerRef.current = setTimeout(()=>{
                db.ref("sessions/"+sc).once("value").then(snap2=>{
                  if (snap2.exists() && snap2.val().status==="playing") handleEndGame(snap2.val(), sc);
                });
              }, remaining);
            } else {
              // Temps déjà écoulé — terminer immédiatement
              db.ref("sessions/"+sc).once("value").then(snap2=>{
                if (snap2.exists() && snap2.val().status==="playing") handleEndGame(snap2.val(), sc);
              });
            }
          }
        } else if (s.status==="playing") {
          // Rejoint en retard
          setScreen("latejoin");
        } else if (s.status==="waiting") {
          setScreen("waiting");
        } else {
          localStorage.removeItem("bp-session"); setScreen("lobby");
        }
      });
    });
  },[]);

  const savePlayer = useCallback(p=>{
    const normalized = normalizePlayer(p);
    setPlayer(normalized); localStorage.setItem("bp-player",JSON.stringify(normalized));
    db.ref("users/"+normalized.name).set(normalized);
  },[]);

  const startLabGame = useCallback(config=>{
    const difficulty = (typeof config === "string") ? config : (config.difficulty || "normal");
    const powerMode = (typeof config === "string") ? false : !!(config.powerMode);
    const cfg = getDifficultyConfig(difficulty);
    clearLabTimers();
    clearNotifTimers();
    clearFreezeEffect();
    const refs = getWordPool(wordLists);
    const nextCard = genCardWithLevels(refs, cfg.size, wordLevels);
    const LAB_CODE = "LABO";
    // Créer une vraie session Firebase avec le code fixe LABO
    // Tous les joueurs qui rejoignent LABO jouent ensemble mais sans stats
    const labSession = {
      host: player.name,
      status: "playing",
      difficulty,
      powerMode,
      isLabSession: true, // flag pour désactiver les stats
      players: {[player.name]: true},
      cards: {[player.name]: nextCard},
      marked: {},
      stats: {},
      winner: null,
      events: null,
      powerState: {shields:{}, targetLock:null, pendingAction:null},
      ghostCells: {},
      trapCells: {},
      startedAt: Date.now(),
      endsAt: null
    };
    db.ref("sessions/"+LAB_CODE).set(labSession).then(()=>{
      setIsLabMode(true);
      setSessionCode(LAB_CODE);
      setSessionData(labSession);
      setCard(nextCard);
      setMarked(getInitialMarkedSet(cfg.size));
      setNotifQueue([]);
      setCurrentNotif(null);
      clRef.current = new Set();
      seenRef.current = new Set();
      statsRef.current = false;
      gameRef.current = true;
      localStorage.setItem("bp-session", LAB_CODE);
      setScreen("game");
    });
  },[player, clearLabTimers, clearNotifTimers, clearFreezeEffect, wordLists, wordLevels]);


  // Listener session
  useEffect(()=>{
    if (!sessionCode||["loading","login","profile","lobby","words"].includes(screen)) return;
    const ref = db.ref("sessions/"+sessionCode);
    const h = snap=>{
      if (!snap.exists()) return;
      const s = snap.val(); setSessionData(s);
      if (!isLabMode && s.status==="playing" && screen==="game" && player && s.cards && s.cards[player.name]) {
        const remoteCard = s.cards[player.name];
        const remoteMarkedObj = (s.marked&&s.marked[player.name])||{};
        const remoteMarked = getInitialMarkedSet(getBoardSize(s));
        Object.keys(remoteMarkedObj).map(Number).forEach(i=>remoteMarked.add(i));
        if (!arraysEqual(remoteCard, card)) setCard(remoteCard);
        const localSorted = Array.from(marked).sort((a,b)=>a-b);
        const remoteSorted = Array.from(remoteMarked).sort((a,b)=>a-b);
        if (!arraysEqual(localSorted, remoteSorted)) {
          setMarked(remoteMarked);
          clRef.current = getCompletedLineKeySet(remoteMarked, getBoardSize(s));
        }
      }

      // En attente -> partie lancee
      if (s.status==="playing"&&screen==="waiting"&&s.cards&&player&&s.cards[player.name]) {
        if (s.isLabSession || sessionCode==="LABO") setIsLabMode(true);
        setCard(s.cards[player.name]); setMarked(getInitialMarkedSet(getBoardSize(s)));
        clRef.current=new Set();
        seenRef.current=new Set();
        clearFreezeEffect();
        statsRef.current=false; gameRef.current=true; setScreen("game");
        // Lancer le timer de durée si défini et si on est le host
        if (s.endsAt && s.host===player.name) {
          clearDurationTimer();
          const remaining = s.endsAt - Date.now();
          if (remaining > 0) {
            durationTimerRef.current = setTimeout(()=>{
              db.ref("sessions/"+sessionCode).once("value").then(snap2=>{
                if (snap2.exists() && snap2.val().status==="playing") handleEndGame(snap2.val(), sessionCode);
              });
            }, remaining);
          }
        }
      }

      // Retardataire -> partie relancee, maintenant je suis dedans
      if (s.status==="playing"&&screen==="latejoin"&&s.cards&&player&&s.cards[player.name]) {
        setCard(s.cards[player.name]); setMarked(getInitialMarkedSet(getBoardSize(s)));
        clRef.current=new Set();
        seenRef.current=new Set();
        clearFreezeEffect();
        statsRef.current=false; gameRef.current=true; setScreen("game");
      }

      // Partie terminee -> ecran gagnant
      if (s.status==="finished" && (screen==="game" || screen==="latejoin")) {
        gameRef.current=false;
        clearFreezeEffect();
        if (s.winner===(player&&player.name)) { setShowConfetti(true); setTimeout(()=>setShowConfetti(false),5500); }
        setScreen("winner");
      }

      // Rematch : session remise en attente depuis winner
      if (s.status==="waiting"&&screen==="winner") {
        setMarked(getInitialMarkedSet(getBoardSize(s))); setCard([]);
        clRef.current=new Set(); seenRef.current=new Set();
        clearFreezeEffect();
        statsRef.current=false; gameRef.current=false;
        setScreen("waiting");
      }
    };
    ref.on("value",h); return ()=>ref.off("value",h);
  },[sessionCode,screen,player&&player.name,clearFreezeEffect,isLabMode,card,marked]);

  // Listener evenements en jeu
  useEffect(()=>{
    if (screen!=="game"||!sessionCode||!player) return;
    const t0 = Date.now();
    const ref = db.ref("sessions/"+sessionCode+"/events");
    const h = ref.on("child_added",snap=>{
      const ev = snap.val(); if (!ev) return;
      if (seenRef.current.has(snap.key)) return;
      seenRef.current.add(snap.key);
      if (ev.timestamp<t0-4000) return;
      if (ev.type==="freeze") {
        if (ev.player!==player.name) {
          applyFreezeEffect(ev);
          // Animation freeze pour les victimes
          setPowerAnim({type:"freeze", id:snap.key});
          db.ref("users/"+ev.player).once("value").then(us=>{
            const ud = us.val()||{};
            scheduleNotif({
              id:snap.key,
              player:ev.player,
              message:ev.message,
              phrase:ev.phrase||null,
              photo:ud.photo||null,
              streak:ud.streak||0
            });
          });
        }
        return;
      }
      // Tout pouvoir (hors freeze) lève le freeze en cours
      if (["shuffle","shield","target","bomb","sabotage","ghost","trap"].includes(ev.type)) {
        clearFreezeEffect();
        if (ev.type==="shield") {
          // Bouclier : animation ET notification uniquement pour l'émetteur
          if (ev.player===player.name) {
            setPowerAnim({type:"shield", id:snap.key});
          }
          return; // Pas de notif pour les autres
        } else if (ev.player!==player.name) {
          // Autres pouvoirs : animation pour les victimes
          setPowerAnim({type:ev.type, id:snap.key});
        }
      }
      if (ev.player===player.name) return;
      db.ref("users/"+ev.player).once("value").then(us=>{
        const ud = us.val()||{};
        scheduleNotif({id:snap.key,player:ev.player,message:ev.message,phrase:ev.phrase||null,photo:ud.photo||null,streak:ud.streak||0});
      });
    });
    return ()=>ref.off("child_added",h);
  },[screen,sessionCode,player&&player.name,applyFreezeEffect,scheduleNotif,clearFreezeEffect]);

  // Login
  const handleLogin = name=>{
    db.ref("users/"+name).once("value").then(snap=>{
      const p = normalizePlayer(snap.exists() ? snap.val() : {name});
      savePlayer(p); setScreen("profile");
    });
  };

  // Creer session
  const handleCreate = ()=>{
    const code = genCode();
    setIsLabMode(false);
    clearNotifTimers();
    clearFreezeEffect();
    db.ref("sessions/"+code).set({
      host:player.name, status:"waiting", createdAt:Date.now(),
      players:{[player.name]:true}, cards:{}, marked:{}, winner:null,
      stats:{},
      difficulty:"normal", powerMode:false,
      powerState:{shields:{},targetLock:null,pendingAction:null}, ghostCells:{}, trapCells:{}
    }).then(()=>{ setSessionCode(code); localStorage.setItem("bp-session",code); setScreen("waiting"); });
  };

  // Rejoindre session (meme si partie en cours)
  const handleJoin = code=>new Promise((res,rej)=>{
    const isLab = code.toUpperCase() === "LABO";
    setIsLabMode(isLab);
    clearNotifTimers();
    clearFreezeEffect();
    db.ref("sessions/"+code).once("value").then(snap=>{
      if (!snap.exists()) { alert("Session introuvable !"); res(); return; }
      const s = snap.val();
      const updates = {};
      updates["players/"+player.name] = true;
      // Si la session LABO est en cours, générer une carte pour ce joueur
      if (isLab && s.status==="playing" && !(s.cards&&s.cards[player.name])) {
        const cfg = getDifficultyConfig(s.difficulty||"normal");
        const refs = getWordPool(wordLists);
        const newCard = genCardWithLevels(refs, cfg.size, wordLevels);
        updates["cards/"+player.name] = newCard;
      }
      const currentPlayers = Object.keys(s.players||{});
      const hostStillHere = s.host && currentPlayers.includes(s.host);
      if (!hostStillHere && s.status==="waiting") {
        updates.host = player.name;
      }
      db.ref("sessions/"+code).update(updates).then(()=>{
        db.ref("sessions/"+code).once("value").then(snap2=>{
          const s2 = snap2.val()||s;
          setSessionCode(code); setSessionData(s2);
          localStorage.setItem("bp-session",code);
          if (s2.status==="playing") {
            if (s2.cards&&s2.cards[player.name]) {
              // Rejoindre directement en jeu (labo ou partie en cours avec carte)
              setCard(s2.cards[player.name]);
              const mo = (s2.marked&&s2.marked[player.name])||{};
              const ms = getInitialMarkedSet(getBoardSize(s2));
              Object.keys(mo).map(Number).forEach(i=>ms.add(i));
              setMarked(ms);
              clRef.current=new Set();
              seenRef.current=new Set();
              statsRef.current=false; gameRef.current=true;
              setScreen("game");
            } else {
              setScreen("latejoin");
            }
          } else {
            setScreen("waiting");
          }
          res();
        });
      }).catch(rej);
    }).catch(rej);
  });

  const handleConfigChange = config=>{
    if (!sessionCode || !sessionData || sessionData.host!==player.name) return;
    const nextDifficulty = config.difficulty || sessionData.difficulty || "normal";
    const updates = {difficulty:nextDifficulty};
    if (Object.prototype.hasOwnProperty.call(config,"powerMode")) {
      updates.powerMode = !!config.powerMode;
    }
    if (Object.prototype.hasOwnProperty.call(config,"duration")) {
