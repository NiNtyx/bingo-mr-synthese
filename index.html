      updates.duration = config.duration; // null = sans limite
    }
    db.ref("sessions/"+sessionCode).update(updates);
  };

  const handleSuggestWord = useCallback((word)=>{
    if (!player || !db) return;
    const cleanWord = (word||"").trim().replace(/\s+/g," ");
    if (!cleanWord) return;
    const officialList = getWordPool(wordLists);
    if (officialList.some(item=>item.toLowerCase()===cleanWord.toLowerCase())) return;
    const existing = Object.entries(wordSuggestions).find(([, suggestion])=>
      suggestion &&
      (suggestion.word||"").toLowerCase()===cleanWord.toLowerCase()
    );
    if (existing) return;
    db.ref("wordSuggestions").push({
      word: cleanWord,
      createdAt: Date.now(),
      createdBy: player.name,
      votes: {[player.name]:1}
    });
  },[player,wordLists,wordSuggestions]);

  const handleVoteSuggestion = useCallback((suggestionId, vote)=>{
    if (!player || !db) return;
    const suggestion = wordSuggestions[suggestionId];
    if (!suggestion) return;
    const votes = {...(suggestion.votes||{})};
    votes[player.name] = vote;
    const score = Object.values(votes).reduce((sum,val)=>sum+(val||0),0);
    if (score >= 3) {
      const list = getWordPool(wordLists);
      if (!list.some(item=>item.toLowerCase()===(suggestion.word||"").toLowerCase())) {
        db.ref("wordLists/bts").set([...list, suggestion.word]);
      }
      db.ref("wordSuggestions/"+suggestionId).remove();
      return;
    }
    if (score <= -3) {
      db.ref("wordSuggestions/"+suggestionId).remove();
      return;
    }
    db.ref("wordSuggestions/"+suggestionId+"/votes").set(votes);
  },[player,wordSuggestions,wordLists]);

  const handleResolvePowerAction = useCallback(payload=>{
    if (!sessionData || !player) return;
    const pending = ((sessionData.powerState||{}).pendingAction)||null;
    if (!pending || pending.owner!==player.name) return;
    if (pending.type==="target") {
      if (!payload || !payload.target || payload.target===player.name || !((pending.targets||[]).includes(payload.target))) return;
      updatePowerState(state=>({
        ...state,
        pendingAction:null,
        targetLock:{owner:player.name,target:payload.target,createdAt:Date.now()}
      }));
      return;
    }
    if (pending.type==="sabotage") {
      const target = payload&&payload.target;
      const index = payload&&payload.index;
      if (!target || target===player.name || index===undefined || index===null || !((pending.targets||[]).includes(target))) return;
      const currentMarked = (((sessionData.marked||{})[target])||{});
      if (!currentMarked[index]) return;
      const nextMarked = {...currentMarked};
      delete nextMarked[index];
      db.ref("sessions/"+sessionCode+"/marked/"+target).set(nextMarked).then(()=>{
        updatePowerState(state=>({
          ...state,
          pendingAction:null
        }));
      });
    }
  },[sessionData,player,sessionCode,updatePowerState]);

  // Lancer la partie
  const handleStart = ()=>{
    setIsLabMode(false);
    clearNotifTimers();
    clearFreezeEffect();
    clearDurationTimer();
    db.ref("sessions/"+sessionCode).once("value").then(snap=>{
      const latest = snap.val() || {};
      const ps = Object.keys(latest.players||{});
      const size = getBoardSize(latest);
      const refs = getWordPool(wordLists);
      const cards = {};
      ps.forEach(p=>{ cards[p]=genCardWithLevels(refs, size, wordLevels); });
      const duration = latest.duration || null;
      const startedAt = Date.now();
      const endsAt = duration ? startedAt+duration : null;
      db.ref("sessions/"+sessionCode).update({
        status:"playing",
        cards,
        marked:{},
        stats:{},
        winner:null,
        events:null,
        startedAt,
        endsAt,
        difficulty:latest.difficulty||"normal",
        powerMode:!!latest.powerMode,
        powerState:{shields:{},targetLock:null,pendingAction:null},
        ghostCells:{},
        trapCells:{}
      });
    });
  };

  // Toggle case (selection ET deselection)
  const handleToggle = useCallback(i=>{
    const size = getBoardSize(sessionData);
    const totalCells = getCompletionTarget(size);
    const isFrozenCell = !!(freezeState && freezeState.index===i);
    if (!card[i]||card[i]==="FREE"||isFrozenCell||(sessionData&&sessionData.winner)||!gameRef.current) return;

    // Vérifier si c'est une ghost cell (leurre)
    if (!isLabMode) {
      const ghostCells = (sessionData&&sessionData.ghostCells&&sessionData.ghostCells[player.name]) || {};
      const ghostInfo = ghostCells[String(i)];
      if (ghostInfo) {
        // Notifier le joueur qu'il a trouvé la case ghost
        scheduleNotif({
          id: Date.now()+i,
          player: player.name,
          message: "Case Ghost découverte ! 👻",
          phrase: "Le vrai mot « "+ghostInfo.realWord+" » est validé automatiquement !",
          photo: player.photo||null,
          streak: player.streak||0
        });
        // Supprimer le ghost et restaurer le vrai mot dans la carte
        const nextCard = [...card];
        nextCard[i] = ghostInfo.realWord;
        setCard(nextCard);
        db.ref("sessions/"+sessionCode+"/cards/"+player.name).set(nextCard);
        db.ref("sessions/"+sessionCode+"/ghostCells/"+player.name+"/"+i).remove();
        // Cocher la vraie case automatiquement — ne pas return, laisser continuer le toggle
      }
      // Vérifier si c'est une trap cell
      const trapCells = (sessionData&&sessionData.trapCells&&sessionData.trapCells[player.name]) || {};
      const trapInfo = trapCells[String(i)];
      if (trapInfo && !trapInfo.pending) {
        db.ref("sessions/"+sessionCode+"/trapCells/"+player.name+"/"+i+"/pending").set(true);
        return;
      }
    }
    const nm = new Set(marked);
    if (nm.has(i)) return;
    nm.add(i);
    setMarked(nm);
    const mo = {}; nm.forEach(x=>{ mo[x]=true; });
    if (isLabMode) setSessionData(sd=>sd ? ({...sd,marked:{...(sd.marked||{}),[player.name]:mo}}) : sd);
    else {
      db.ref("sessions/"+sessionCode+"/marked/"+player.name).set(mo);
      db.ref("sessions/"+sessionCode+"/stats/"+player.name+"/lastMarkedAt").set(Date.now());
    }

    // clRef reflète TOUJOURS l'état juste avant ce toggle.
    // On le resynchronise depuis `marked` en début de toggle pour capturer
    // les suppressions de cases faites par bomb/sabotage (qui mettent à jour
    // marked via Firebase mais peuvent désynchroniser clRef si le re-render
    // React n'a pas encore propagé la nouvelle valeur dans la closure).
    clRef.current = getCompletedLineKeySet(nm, size);
    // nm = marked + i, donc "avant le toggle" = nm sans i
    const nmBefore = new Set(nm); nmBefore.delete(i);
    const previousLineKeys = getCompletedLineKeySet(nmBefore, size);
    const nowCompleted = getLines(nm, size);
    const freshLines = nowCompleted.filter(line=>!previousLineKeys.has(line.cells.join("-")));
    const scoringLines = freshLines.filter(line=>line.type!=="diagonale");

    if (scoringLines.length > 0 && !isLabMode) {
      db.ref("sessions/"+sessionCode+"/stats/"+player.name+"/lineCount").transaction(current=>(current||0)+scoringLines.length);
    }

    if (freshLines.length > 0 && nm.size < totalCells) {
      freshLines.forEach(line=>{
        if (line.type==="diagonale") return;
        let msg, phrase;
        if (line.type==="ligne") {
          msg = player.name+" a complété une LIGNE ! 🎯";
          phrase = randFrom(LINE_PHRASES);
        } else if (line.type==="colonne") {
          msg = player.name+" a complété une COLONNE ! 📏";
          phrase = randFrom(COL_PHRASES);
        } else {
          return;
        }
        if (!isLabMode) {
          db.ref("sessions/"+sessionCode+"/events").push({
            player:player.name, message:msg, phrase:phrase, type:line.type, timestamp:Date.now()
          });
        }
        // Notification locale (vrai jeu ET labo)
        scheduleNotif({id:Date.now()+line.cells[0],player:player.name,message:msg,phrase:phrase,photo:player.photo||null,streak:player.streak||0});

        const shouldTriggerPower = !!(sessionData&&sessionData.powerMode);
        if (shouldTriggerPower) {
          const localPowerId = Date.now()+line.cells[0];

          if (isLabMode) {
            // === POUVOIR EN MODE LABO (local, sans Firebase) ===
            const timer = setTimeout(()=>{
              const lastLabPower = sessionData&&sessionData.powerState&&sessionData.powerState.lastPowerType;
              const labPools = POWER_TYPES.filter(p => p !== lastLabPower);
              const powerType = randFrom(labPools.length > 0 ? labPools : POWER_TYPES);
              let powerMessage = "";
              let powerPhrase = "";

              if (powerType==="freeze") {
                powerMessage = player.name+" active le pouvoir Freeze ! ❄️";
                powerPhrase = "Une case non cochée est gelée (simulation labo).";
              } else if (powerType==="shuffle") {
                powerMessage = player.name+" active le pouvoir Shuffle ! 🔀";
                powerPhrase = "Les grilles seraient mélangées en vrai jeu.";
              } else if (powerType==="shield") {
                powerMessage = player.name+" active un Bouclier ! 🛡️";
                powerPhrase = "Le prochain pouvoir adverse serait bloqué.";
              } else if (powerType==="target") {
                powerMessage = player.name+" active Ciblage ! 🎯";
                powerPhrase = "Il ciblerait un adversaire en vrai jeu.";
              } else if (powerType==="bomb") {
                powerMessage = player.name+" active Bombe ! 💣";
                powerPhrase = "Les adversaires perdraient une case en vrai jeu.";
              } else if (powerType==="ghost") {
                powerMessage = player.name+" active Ghost ! 👻";
                powerPhrase = "Une case deviendrait un leurre chez les adversaires en vrai jeu.";
              } else if (powerType==="trap") {
                powerMessage = player.name+" active Trap ! 🪤";
                powerPhrase = "Une case serait piégée avec un gage en vrai jeu : "+randFrom(TRAP_GAGES);
              } else {
                powerMessage = player.name+" active Sabotage ! 🧨";
                powerPhrase = "Il retirerait une case chez un adversaire en vrai jeu.";
              }

              // Mémoriser le dernier pouvoir en labo aussi
              setSessionData(sd => sd ? ({...sd, powerState:{...(sd.powerState||{}), lastPowerType:powerType}}) : sd);
              clearFreezeEffect();
              setPowerAnim({type:powerType, id:"lab-"+localPowerId});
              scheduleNotif({
                id:"lab-power-"+localPowerId,
                player:player.name,
                message:powerMessage,
                phrase:powerPhrase,
                photo:player.photo||null,
                streak:player.streak||0
              });
            }, POWER_NOTIFICATION_DELAY);
            notifTimersRef.current.push(timer);

          } else {
            // === POUVOIR EN VRAI JEU ===
            const currentPS = (sessionData&&sessionData.powerState) || {};
            const lastPower = currentPS.lastPowerType || null;
            const allAvailable = getAvailablePowerTypes(sessionData, player.name);
            const filtered = allAvailable.filter(p => p !== lastPower);
            const powerType = randFrom(filtered.length > 0 ? filtered : allAvailable);
            const timer = setTimeout(()=>{
              const currentPowerState = (sessionData&&sessionData.powerState) || {shields:{},targetLock:null,pendingAction:null};
              const nextPowerState = {
                shields:{...(currentPowerState.shields||{})},
                targetLock:currentPowerState.targetLock||null,
                pendingAction:null
              };
              const allOthers = getOtherPlayerNames(sessionData, player.name);
              let effectiveTargets = [];
              if (OFFENSIVE_POWER_TYPES.includes(powerType)) {
                effectiveTargets = [...allOthers];
                if (nextPowerState.targetLock && nextPowerState.targetLock.target && allOthers.includes(nextPowerState.targetLock.target) && nextPowerState.targetLock.target!==player.name) {
                  effectiveTargets = [nextPowerState.targetLock.target];
                }
                nextPowerState.targetLock = null;
                effectiveTargets = effectiveTargets.filter(name=>{
                  if (nextPowerState.shields[name]) {
                    delete nextPowerState.shields[name];
                    return false;
                  }
                  return true;
                });
              }

              let powerMessage = "";
              let powerPhrase = "";
              const writes = [];
              const powerEvent = {player:player.name,type:powerType,timestamp:Date.now()};

              if (powerType==="freeze") {
                const freezeTargets = buildFreezeTargets(sessionData, player.name);
                const filteredTargets = {};
                effectiveTargets.forEach(name=>{
                  if (freezeTargets[name]!==undefined) filteredTargets[name] = freezeTargets[name];
                });
                powerMessage = player.name+" active le pouvoir Freeze ! ❄️";
                powerPhrase = Object.keys(filteredTargets).length>0
                  ? "Une case non cochée est gelée chez les autres."
                  : "Mais personne n'a pu être gelé cette fois.";
                if (Object.keys(filteredTargets).length>0) {
                  powerEvent.targets = filteredTargets;
                }
              } else if (powerType==="shuffle") {
                powerMessage = player.name+" active le pouvoir Shuffle ! 🔀";
                powerPhrase = effectiveTargets.length>0
                  ? "Les grilles des autres sont mélangées, mais leurs cases cochées restent cochées."
                  : "Mais tous les joueurs visés étaient protégés.";
                effectiveTargets.forEach(name=>{
                  const currentCard = (sessionData.cards&&sessionData.cards[name])||[];
                  const currentMarked = ((sessionData.marked||{})[name])||{};
                  const shuffledState = shuffleBoardState(currentCard, currentMarked, size);
                  writes.push(db.ref("sessions/"+sessionCode+"/cards/"+name).set(shuffledState.card));
                  writes.push(db.ref("sessions/"+sessionCode+"/marked/"+name).set(shuffledState.marked));
                });
              } else if (powerType==="shield") {
                nextPowerState.shields[player.name] = true;
                powerMessage = player.name+" active un Bouclier ! 🛡️";
                powerPhrase = "Le prochain pouvoir adverse qui devait le toucher sera bloqué.";
              } else if (powerType==="target") {
                nextPowerState.pendingAction = {type:"target",owner:player.name,createdAt:Date.now(),targets:allOthers};
                powerMessage = player.name+" active Ciblage ! 🎯";
                powerPhrase = "Il choisit maintenant qui recevra seul le prochain pouvoir offensif.";
              } else if (powerType==="bomb") {
                powerMessage = player.name+" active Bombe ! 💣";
                powerPhrase = effectiveTargets.length>0
                  ? "Les autres perdent chacun une case déjà cochée."
                  : "Mais tous les joueurs visés étaient protégés.";
                effectiveTargets.forEach(name=>{
                  const currentMarked = {...(((sessionData.marked||{})[name])||{})};
                  const choices = Object.keys(currentMarked).map(Number).filter(index=>index!==getFreeIndex(size));
                  if (choices.length>0) {
                    delete currentMarked[randFrom(choices)];
                    writes.push(db.ref("sessions/"+sessionCode+"/marked/"+name).set(currentMarked));
                  }
                });
              } else if (powerType==="sabotage") {
                const validTargets = effectiveTargets.filter(name=>getSelectableMarkedIndices(sessionData, name).length>0);
                powerMessage = player.name+" active Sabotage ! 🧨";
                powerPhrase = validTargets.length>0
                  ? "Il choisit une case déjà cochée à retirer chez un adversaire."
                  : "Mais aucun adversaire ne pouvait être saboté.";
                if (validTargets.length>0) {
                  nextPowerState.pendingAction = {type:"sabotage",owner:player.name,createdAt:Date.now(),targets:validTargets};
                }
              } else if (powerType==="ghost") {
                // Choisir une case non cochée aléatoire chez chaque adversaire ciblé
                const ghostFreezeTargets = buildFreezeTargets(sessionData, player.name);
                const allWords = getWordPool(wordLists);
                // Leurre = uniquement des mots de niveau "facile"
                const getLevel = w => wordLevels[encodeURIComponent(w).replace(/\./g,'%2E')] || null;
                const easyWords = allWords.filter(w => getLevel(w) === 'facile');
                const fakeWordPool = easyWords.length >= 3 ? easyWords : allWords; // fallback si pas assez de facile
                powerMessage = player.name+" active le pouvoir Ghost ! 👻";
                let ghostApplied = false;
                effectiveTargets.forEach(name=>{
                  const targetIndex = ghostFreezeTargets[name];
                  if (targetIndex===undefined) return;
                  const targetCard = (sessionData.cards&&sessionData.cards[name])||[];
                  const realWord = targetCard[targetIndex];
                  if (!realWord || realWord==="FREE") return;
                  // Choisir un faux mot différent du vrai et forcément de niveau facile
                  const candidates = fakeWordPool.filter(w=>w!==realWord);
                  const fakeWord = candidates.length>0 ? randFrom(candidates) : realWord+"?";
                  // Remplacer le mot dans la carte de la victime
                  const nextCard = [...targetCard];
                  nextCard[targetIndex] = fakeWord;
                  writes.push(db.ref("sessions/"+sessionCode+"/cards/"+name).set(nextCard));
                  // Stocker la ghost cell : index -> {realWord, fakeWord}
                  writes.push(db.ref("sessions/"+sessionCode+"/ghostCells/"+name+"/"+targetIndex).set({realWord, fakeWord}));
                  ghostApplied = true;
                });
                powerPhrase = ghostApplied
                  ? "Une case devient un leurre : si coch\u00e9e, elle se r\u00e9v\u00e8le et n'est pas comptabilis\u00e9e !"
                  : "Mais personne n'a pu être piégé cette fois.";
              } else if (powerType==="trap") {
                const trapFreezeTargets = buildFreezeTargets(sessionData, player.name);
                powerMessage = player.name+" active le pouvoir Trap ! 🪤";
                let trapApplied = false;
                effectiveTargets.forEach(name=>{
                  const targetIndex = trapFreezeTargets[name];
                  if (targetIndex===undefined) return;
                  const targetCard = (sessionData.cards&&sessionData.cards[name])||[];
                  const targetWord = targetCard[targetIndex];
                  if (!targetWord || targetWord==="FREE") return;
                  const gage = randFrom(TRAP_GAGES);
                  writes.push(db.ref("sessions/"+sessionCode+"/trapCells/"+name+"/"+targetIndex).set({
                    gage,
                    owner: player.name,
                    voters: {},
                    pending: false
                  }));
                  trapApplied = true;
                });
                powerPhrase = trapApplied
                  ? "Une case est piégée ! Le joueur devra réaliser un gage pour la valider !"
                  : "Mais personne n'a pu être piégé cette fois.";
              }

              nextPowerState.lastPowerType = powerType;
              writes.push(db.ref("sessions/"+sessionCode+"/powerState").set(nextPowerState));
              writes.push(db.ref("sessions/"+sessionCode+"/events").push({
                ...powerEvent,
                message:powerMessage,
                phrase:powerPhrase
              }));
              clearFreezeEffect();
              setPowerAnim({type:powerType, id:"self-"+localPowerId});
              Promise.all(writes);
            }, POWER_NOTIFICATION_DELAY);
            notifTimersRef.current.push(timer);
            scheduleNotif({
              id:"power-local-"+localPowerId,
              player:player.name,
              message:
                powerType==="freeze" ? (player.name+" active le pouvoir Freeze ! ❄️") :
                powerType==="shuffle" ? (player.name+" active le pouvoir Shuffle ! 🔀") :
                powerType==="shield" ? (player.name+" active un Bouclier ! 🛡️") :
                powerType==="target" ? (player.name+" active Ciblage ! 🎯") :
                powerType==="bomb" ? (player.name+" active Bombe ! 💣") :
                powerType==="ghost" ? (player.name+" active Ghost ! 👻") :
                powerType==="trap" ? (player.name+" active Trap ! 🪤") :
                (player.name+" active Sabotage ! 🧨"),
              phrase:
                powerType==="freeze" ? "Une case non cochée est gelée chez les autres." :
                powerType==="shuffle" ? "Les grilles des autres sont melangees." :
                powerType==="shield" ? "Le prochain pouvoir adverse qui devait le toucher sera bloqué." :
                powerType==="target" ? "Il choisit maintenant qui recevra seul le prochain pouvoir offensif." :
                powerType==="bomb" ? "Les autres perdent chacun une case déjà cochée." :
                powerType==="ghost" ? "Une case devient un leurre chez les adversaires !" :
                powerType==="trap" ? "Une case est pi\u00e9g\u00e9e avec un gage !" :
                "Il choisit une case d\u00e9j\u00e0 coch\u00e9e \u00e0 retirer chez un adversaire.",
              photo:player.photo||null,
              streak:player.streak||0
            }, POWER_NOTIFICATION_DELAY);
          }
        }
      });
    }

    // BINGO total
    if (nm.size===totalCells) {
      gameRef.current=false;
      if (isLabMode) setSessionData(sd=>sd ? ({...sd,winner:player.name,status:"finished"}) : sd);
      else db.ref("sessions/"+sessionCode).update({winner:player.name,status:"finished"});
      if (!isLabMode) {
        db.ref("sessions/"+sessionCode+"/events").push({
          player:player.name,message:"a remporté la partie ! BINGO TOTAL 🏆",type:"bingo",timestamp:Date.now()
        });
        const ranked = isStandardRankedMode(sessionData);
        const newStreak = ranked ? (player.streak||0)+1 : (player.streak||0);
        const difficultyWinKey = getDifficultyWinKey((sessionData&&sessionData.difficulty) || "normal");
        const np = {
          ...player,
          wins:(player.wins||0)+1,
          [difficultyWinKey]:(player[difficultyWinKey]||0)+1,
          gamesPlayed:(player.gamesPlayed||0)+1,
          streak: ranked ? newStreak : (player.streak||0),
          bestStreak: ranked ? Math.max(newStreak,player.bestStreak||0) : (player.bestStreak||0)
        };
        savePlayer(np);
        // Incrémenter gamesPlayed + réinitialiser série pour les perdants
        const allPlayers = Object.keys((sessionData&&sessionData.players)||{});
        allPlayers.filter(n=>n!==player.name).forEach(name=>{
          db.ref("users/"+name).once("value").then(snap=>{
            const lp = normalizePlayer(snap.val()||{name});
            db.ref("users/"+name).update({
              gamesPlayed:(lp.gamesPlayed||0)+1,
              streak: ranked ? 0 : (lp.streak||0)
            });
          });
        });
        const summary = buildSessionSummary(sessionCode, sessionData, player.name, {
          [player.name]: {lineCount:scoringLines.length}
        });
        db.ref("meta/lastSession").set(summary);
      }
      setShowConfetti(true); setTimeout(()=>setShowConfetti(false),5500);
      setScreen("winner");
    }
  },[card,marked,sessionData,sessionCode,player,savePlayer,isLabMode,freezeState,scheduleNotif,wordLevels,wordLists]);

  useEffect(()=>{
    handleToggleRef.current = handleToggle;
  },[handleToggle]);

  const runLabSequence = useCallback(indices=>{
    clearLabTimers();
    indices.forEach((index, step)=>{
      const timer = setTimeout(()=>{
        if (handleToggleRef.current) handleToggleRef.current(index);
      }, step*180);
      labTimersRef.current.push(timer);
    });
  },[clearLabTimers]);

  const handleLabAction = useCallback(action=>{
    if (!isLabMode || !sessionData) return;
    const size = getBoardSize(sessionData);
    const freeIndex = getFreeIndex(size);

    if (action==="ligne" || action==="colonne") {
      // Filtrer les lignes/colonnes du bon type qui ne sont pas encore completees
      const allOfType = buildLines(size).filter(l=>l.type===action);
      const incomplete = allOfType.filter(l=>l.cells.some(i=>i!==freeIndex && !marked.has(i)));
      if (incomplete.length===0) return;
      // Choisir une ligne aleatoire parmi les incompletes
      const chosen = incomplete[Math.floor(Math.random()*incomplete.length)];
      const seq = chosen.cells.filter(i=>i!==freeIndex && !marked.has(i));
      runLabSequence(seq);
      return;
    }
    if (action==="bingo") {
      const seq = Array.from({length:size*size},(_,i)=>i).filter(i=>i!==freeIndex && !marked.has(i));
      runLabSequence(seq);
      return;
    }
    if (action==="reset") {
      clearLabTimers();
      clearNotifTimers();
      clearFreezeEffect();
      const nextCard = genCardWithLevels(getWordPool(wordLists), size, wordLevels);
      setSessionData(sd=>sd ? ({...sd,status:"playing",winner:null,cards:{[player.name]:nextCard},marked:{},powerState:{shields:{},targetLock:null,pendingAction:null}}) : sd);
      setCard(nextCard);
      setMarked(getInitialMarkedSet(size));
      setNotifQueue([]);
      setCurrentNotif(null);
      clRef.current=new Set();
      seenRef.current=new Set();
      gameRef.current=true;
      setShowConfetti(false);
    }
  },[isLabMode,sessionData,marked,player,runLabSequence,clearLabTimers,clearNotifTimers,clearFreezeEffect,wordLists,wordLevels]);

  // Rematch : remet la session en salle d'attente
  const handleRematch = ()=>{
    if (isLabMode) {
      startLabGame((sessionData&&sessionData.difficulty)||"normal");
      return;
    }
    clearNotifTimers();
    clearFreezeEffect();
    clearDurationTimer();
    db.ref("sessions/"+sessionCode).update({
      status:"waiting", cards:{}, marked:{}, winner:null, events:null, endsAt:null, startedAt:null,
      powerState:{shields:{},targetLock:null,pendingAction:null}, ghostCells:{}, trapCells:{}
    });
  };

  // Quitter definitivement la session
  const handleLeave = ()=>{
    if (isLabMode) {
      clearLabTimers();
      clearNotifTimers();
      clearFreezeEffect();
      clearDurationTimer();
      setIsLabMode(false);
      setSessionCode("");
      setSessionData(null);
      setNotifQueue([]); setCurrentNotif(null);
      setCard([]); setMarked(getInitialMarkedSet(5)); gameRef.current=false;
      setScreen("profile");
      return;
    }
    if (sessionCode) db.ref("sessions/"+sessionCode+"/players/"+player.name).remove();
    clearLabTimers();
    clearNotifTimers();
    clearFreezeEffect();
    clearDurationTimer();
    setSessionCode(""); setSessionData(null); setNotifQueue([]); setCurrentNotif(null);
    setCard([]); setMarked(getInitialMarkedSet(5)); gameRef.current=false;
    localStorage.removeItem("bp-session"); setScreen("lobby");
  };

  // Stats perdant
  useEffect(()=>{
    if (screen==="winner"&&sessionData&&sessionData.winner&&sessionData.winner!==player.name&&player&&!statsRef.current&&!isLabMode) {
      statsRef.current=true;
      savePlayer({
        ...player,
        gamesPlayed:(player.gamesPlayed||0)+1,
        streak:isStandardRankedMode(sessionData) ? 0 : (player.streak||0)
      });
    }
  },[screen, sessionData?.winner]);

  const loading = <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:"rgba(240,232,200,0.3)",fontSize:"1.1rem"}}>Chargement...</div>;

  if (screen==="loading")  return loading;
  if (screen==="login")    return <LoginScreen onLogin={handleLogin}/>;
  if (screen==="profile")  return <ProfileScreen player={player} savePlayer={savePlayer} onContinue={()=>setScreen("lobby")} onLab={()=>setScreen("lab")}/>;
  if (screen==="lab")      return <LabScreen player={player} onBack={()=>setScreen("profile")} onStartLab={startLabGame} onPlayers={()=>setScreen("labPlayers")}/>;
  if (screen==="labPlayers") return <LabPlayersScreen onBack={()=>setScreen("lab")} player={player}/>;
  if (screen==="lobby")    return <>{<LobbyScreen player={player} onProfile={()=>setScreen("profile")} onCreate={handleCreate} onJoin={handleJoin} onWords={()=>setScreen("words")} allUsers={allUsers} lastSessionSummary={lastSessionSummary}/>}{invite && Date.now()-inviteDismissed>5000 && <InvitePopup invite={invite} player={player} onJoin={(code)=>{setInvite(null);setInviteDismissed(Date.now());handleJoin(code);}} onDismiss={()=>{setInviteDismissed(Date.now());setInvite(null);}}/>}</>;
  if (screen==="words")    return <WordsScreen onBack={()=>setScreen("lobby")} player={player} wordLists={wordLists} wordSuggestions={wordSuggestions} onSuggestWord={handleSuggestWord} onVoteSuggestion={handleVoteSuggestion}/>;
  if (screen==="waiting")  return <WaitingScreen sessionCode={sessionCode} sessionData={sessionData} player={player} onStart={handleStart} onLeave={handleLeave} onConfigChange={handleConfigChange}/>;
  if (screen==="latejoin") return <LateJoinScreen sessionData={sessionData} player={player} onLeave={handleLeave}/>;
  if (screen==="game")     return <GameScreen player={player} card={card} marked={marked} sessionData={sessionData} sessionCode={sessionCode} currentNotif={currentNotif} onToggle={handleToggle} onLeave={handleLeave} showConfetti={showConfetti} clearNotif={()=>setCurrentNotif(null)} isLabMode={isLabMode} onLabAction={handleLabAction} freezeState={freezeState} pendingPowerAction={sessionData&&sessionData.powerState&&sessionData.powerState.pendingAction} onResolvePowerAction={handleResolvePowerAction} powerAnim={powerAnim} clearPowerAnim={()=>setPowerAnim(null)} onEndGame={()=>{ db.ref("sessions/"+sessionCode).once("value").then(snap=>{ if(snap.exists()&&snap.val().status==="playing") handleEndGame(snap.val(), sessionCode); }); }}/>;
  if (screen==="winner")   return <WinnerScreen sessionData={sessionData} player={player} onRematch={handleRematch} onLeave={handleLeave} showConfetti={showConfetti} isHost={sessionData&&sessionData.host===player.name}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
